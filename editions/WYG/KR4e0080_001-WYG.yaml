body:
  text: 野古集巻上明龔詡撰五言古詩送徐氏兄子牧之司訓青田凉颷動林柯零露淒以白曰予感衰暮撫景重悽惻况居憂病中復送逺行客惟子方妙齡精進有餘力窮經期致用雲海奮鵬翼安知時命竒失意主司格分教赴青田吳越千里隔雖云官卑冷禮數抗侯伯州縣非不華奔走泚訶責知子素明達榮辱判胸臆一朝别我去毅然無難色相見知何時雲樹杳南北願遵姬孔教麗澤競晨夕清風與髙節當立萬仭壁尤宜戒垂堂少慰二親憶栝蒼古名郡文憲富資益幸寄北飛鴻啟我久茅塞題賔月軒悠悠軒中人皎皎天上月良宵忽邂逅敬待兩無䙝素心期共明雅質願同潔但求保終始何暇計圓缺來亦不須迎去亦不須别淡交有餘情莫與世人説分金圖為廷悦賦古人交有道貴義不貴金悠悠千載餘猶見管鮑心洪水方湯湯羣生困凶歉溝壑同胞人君其幸相念田家詞浮雲終日行雨㸃不曽絶自從秋分來罕得見日月禾頭半生耳蝗囓莖梗折一愁官賦急二恐衣食缺哀哉田野情言之淚流血南野先生哀輓彭澤去千載誰念田園蕪卓哉南野翁乃是斯人徒讀書通大義恥逐章句儒修身事三省惠人期八厨雅性任真率襟懷恒豁如東􅆏樹嘉木西疇藝名蔬適意任所之殽酒隨籃輿兒孫奉賔友歡聲溢庭除每從㣲醉時擊節歌唐虞顧我朽腐材不異櫟與樗謬據西齋裀曽不鄙迂疎星霜二十周始終心不渝暌離幾寒暑雲樹勞嗟吁復憐身後窮棺食預為儲如此綣戀情寧與管鮑殊方圖去茅塞時得親髙居徳業望規箴優游共桑榆如何志未遂頓隔幽明途載瞻湄暘原痛切心如刳臨穴當兹辰忍奠一束芻淚為知巳流老眼誰云枯落葉吟落葉復落葉堦前漸積多雖知無反期未能忘舊柯誰知舊柯心己萌新葉意故情雖不同能不我遐棄作書報新葉且莫誇逢時西風一朝起此情當自知梅花風雪方嚴凝乾坤發清氣馨香逺彌佳顔色淡逾貴一聞鳴玉聲已醖調羮味衆芳當避路讓他出頭地七言古詩鐵心行寄沈誠學我有胸中一塊鐵贈君鍛鍊成寳刀不殺狐狸及鼷䑕要斬南山白額長橋蛟視蛟如蚓虎如猫心不為功力不勞功成畢竟藏諸韜肯將割肉供君庖縱教埋沒不復用終使神光夜燭牛斗髙萊菴先生歌先生姓周字敬修芝川人隠君子也先生雅志樂田野結屋東􅆏事耕稼不比當年捷徑人暫託終南待髙價不憂丞相嗔不遭官長罵不騎馬旁人門不低頭出胯下白梅翠竹繞屋栽歳晚吟觀樂清暇粗衣糲食飽暖休容膝茅􅗔只三架窓前書巻聖賢心林下漁樵今古話一出一處聴自然一死一生隨造化從今寄語郭景純莫為顔含占易卦觀梅圖先生雅操如氷玉不愛繁華愛幽獨有足不踏公家門有口不食非義粟却來山水最竒處賸種梅花搆吟屋霜林雪逕常獨遊竹杖芒鞋巾一幅疎影暗香詩一聨千年膾炙無人續鶴骨久仙吟夢寒畫圖尚爾清人目君不見湧金門外西湖邊花栁富貴人争傳年年二月三月天士女嬉游多畫船望中一㸃青青然為識先生名更妍山居讀書圖先生好遁藏幽谷考槃自樂忘榮辱朝看黄鶴天際飛暮見白雲簷下宿霜後班班􅏄葉紅雨過青青書帶緑螢窓雪案聖賢書不惜勤劬終歳讀每當心領神㑹處如見孔顔真面目信知名教有樂地何羨輕裘與粱肉飢䑕行燈火乍熄初入更飢䑕出穴啾啾鳴囓書翻盆復倒甕使我頻驚不成夢狸奴徒爾誇銜蟬但知飽食終夜眠痴兒計拙真可笑布被䝉頭學猫呌續白額行白額白額猛且雄居然據我林之中白日出林取人食饞口大開如血紅搖頭掉尾似得意流血滂滂無慘容遂令自古南山下大道盡日無人縱一朝忽與獵夫遇宻網強弓繞林樹白額計窮無所逃四足如豚縛將去雖然搖尾乞人憐積惡過深寧汝恕却憐三四假威狐遁跡潜形在何處稽山送别圖為陸則明賦越山青青越水白古來勝景多遺跡離人話别不勝情徃徃圖之贈行色陸君來此成清遊行行直上稽山頭若耶秦望翫未己興盡忽泛山隂舟盍簮士友逺相送為寫新圖託規諷惓惓忠孝逺相期此意須知愛君重君今快着祖生鞭明年應轉東南轅擬沽濁酒候江上共􅂸一醉春風前瘦馬圖有馬生來異骨骼老病多年伏槽􅌴皮肉消盡精神衰無復長驅騁材力憶昔爾當雄壯時一食或盡粟一石鞍韉既被不着鞭千里脩途如咫尺安知今日乃如此欲比駑駘豈能得有時自悼一長鳴奴隸無知謂求食殘芻敗草隨意與半饑半飽度朝夕哀哉爾馬誠可憐伯樂無人誰汝惜生時識者既寂寥死骨豈復千金直老鶴骨節稜稜氷玉清羽毛翩翩霜雪明不隨神仙去紫府與我共結林壑盟寧甘饑渴守我分飲啄肯與羣鷄争竹間花外每獨步風前月底時一鳴有時向我展翼舞似欲和我吟詩聲君不見弋媒狥食良可耻衞國乗軒何足榮願言與爾共卒歳不必雲霄馳逺情雲鷗歌白雲閒似白鷗閒鷗在清溪雲在山道人家在溪山間日與雲鷗相徃還雲無期兮鷗不約自信溪山有真樂好爵未足攖我情俯仰雲鷗無愧怍雲耶鷗耶不可忘等閒為爾開壺觴醉來雲散鷗亦去一榻清風夢正長題畫竹石寄馬字昌沈養明并叙二生於余有從游之舊别久不能為情近陳羽伯以寫竹石見遺因賦此寄之國風興淇竹易繇云介石我思千載人時能踐其迹武公之徳不可忘周公之辭何孔章乃知在意不在畫無鹽底須脂粉粧馬生沈生我湜籍頗知好古循規則椎鑿不斵太古心霜雪寧凋歳寒色别來又見秋風凉相思之情江水長為書古道用相勉願視竹石同􅅅墻自題畫像并送康友竹歸慶安十年不見康友竹一日客裏驚相逢江湖落魄總相似生意不殊心事同為施丹青造化筆寫我山林枯槁容鐵冠布衲草為履抱琴瘦僕行相從寒風兩鬢吹蓬鬆雪中古木霜中鴻風流敢託歸來翁一團清氣蟠心胸功名不羨褒鄂公莞爾一笑浮雲空今年五十已過二六十相將在眼中君今還西我歸東一聚一散真萍蓬他時何處可得復相遇為我添箇尋詩笻送琴士吳先生南歸先生犖犖真竒士瑩若氷壺貯秋水茫茫宇宙一閒身南北東西任行止平生知已只桐君出入與俱忘汝爾每逢佳境得幽趣輒發長歌奏清徴南窺禹穴抵吳宫洗盡少年筝笛耳先生所寳清如此凡塵不受纎毫滓却視營營世路人一生何殊負塗豕我從南園一見之笑談如在春風裏金蘭投分即弟兄交親何必生同里君今别我甬東去湖海後期那可擬倘因雲樹寄相思㑹向江頭候雙鯉題朱舎人畫南軒放鶴軒壁墨竹郎官歸自絲綸閣醉向髙堂寫林薄修篁挺挺石蒼蒼細雨濛濛烟漠漠坐令咫尺見千里信爾胸中有邱壑南野老人真好竒舉酒屬客要題詩座中英彦六七輩文彩照耀光陸離文雄畫妙兩絶作悦目洗心良可樂吁嗟老我駑鈍姿浪跡江湖久淪落邇來謬據西齋裀知己歳寒欣有託清風明月幸平分時得吟觀伴孤鶴懷東莊我家瀟洒同三徑車馬不聞塵土净白雲流水互濛回翠竹蒼松相掩映甕有新醅架有書果蔬自足供盤飣老妻甘與共清貧勸我不須干趙孟十年作客南野堂麋鹿未忘山野性惓惓雖荷故人情食粟每羞才不稱西風昨夜動林柯浩然忽起歸來興殷勤為我報東君好着梅花待吟咏謝孔昭畫山居圖為存誠賦大山峩峩氣凌衆小山拱揖如賔從流泉一派入溪遙古木千章含雨重碩人自愛考槃樂風光不减元公洞盤中苜蓿長闌干松葉釀成香滿甕詩書萬巻聖賢心一生自足供我用世間名利等韁鎻豈肯垂頭受羈鞚不到城中知幾年稚松尚憶移根種憐渠世路苦奔馳得失總成蕉鹿夢我生雖久在樊籠每向江湖羨鱗縱明當拂袖賦歸來風月烟霞幸分共觀泉圖蒼壁倚空如削鐵一帶寒泉噴飛雪只疑天上漏銀河萬古千秋流不竭若有人兮清且狂平生泉石存膏盲科頭箕踞翫不已塵慮一洗無毫芒老我飄蕭同野鶴税駕每懷山水樂願得相從杖履間濯纓濯足隨清濁梅花三公圖為龔紱朝美賦何人善寫生下筆極精妙一枝早發擅魁名三鳥安棲得公號㸃染雖人為活動等天造應知寓託有深意不作纎竒取時好之子嗜文學致澤期逺到一朝無心得此畫無乃開先露機兆鼎鼐調和時氷霜歳寒操願言有志事竟成吾輩宗盟幸輝耀詠紙被紙衾方幅六七尺厚軟輕温膩而白霜天雪夜最相宜不使寒侵獨眠客老夫得此良多年舊物寳愛同青氊不論素􅀈出南海豈羨文錦來西川受用將圖此生過争柰義孫要與阿翁相伴卧阿翁夜夜苦丁寧莫學惡睡驕兒輕踏破織機娘詩織機娘織機娘豆花籬落風露凉連宵織得幾疋布一疋不知多少長豈知東家新婦性拙慢惟解貪眠飽餐飯生憎爾曹吚􅥆不肯休看渠晚歳衣裳問誰辦風狗行風狗風狗名為猘舌吐涎流尾垂曵狂奔迅走不知歸惡勢横行無所忌行人萬一為渠囓失療死亡知必至鄉村城市一經過誰不丁寧戒迴避白日都忘戀主心黒夜全無防盜意必當為人擊死棄中流帷盖終無可埋地詠湯婆長句寄談勿菴勉之共發一笑歳晚江鄉雪盈尺小齋不禁寒氣逼先生獨卧不成眠兩脚渾如水中石今宵何幸得温温伸去縮來隨意得非闗被底别藏春深藉湯婆有餘力此婆生來名阿錫紡織無能有潜徳緘口何曽説是非謀身不解求衣食寂寂無聲伴到明不作驕癡取憐惜君不見此婆有妹名青奴骨格玲瓏如姊黙不容暑氣侵肌膚亦與先生舊相識只因寒暑不同時棄捨塵中倚空壁野古集巻上
