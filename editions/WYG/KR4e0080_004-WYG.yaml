body:
  text: 野古集附録上周文襄公書直𨽻蘇州府崑邑老生龔詡上言欽差巡撫大人執事前詡竊聞古人有言千人之諾諾不如一士之諤諤又曰物不得其平則鳴蓋諾諾者本無忠敬之心惟徇已私所以事上者惟務阿順曲從上人樂其言之甘如飲醇醪不覺自醉遂至日積月深養成大患如昔人始順王安石之㫖而卒發其所短者吕惠卿也若夫諤諤之士心無憸邪志秉忠直其所以尊上者無非至誠故論事無所回隠不無迫切過激之語上人驟聞之逆耳静思利行如飲藥餌雖不適口其病獲痊如古人始而目魏文侯為不仁而卒成仁君之名者任座也是皆往事之明驗理勢必然以此推之凡當大任行大事者諾諾之人不可一日有諤諤之士豈可一日無哉今執事以豪傑之才經濟之學特膺聖天子寵命巡撫東南自下車首以風俗民瘼為事誠所謂不世之賢而能體聖天子愛恤軍民之盛心者也然詡竊見在下之人諾諾者常多諤諤者常少又有等恃執事寛仁厚徳而敢為悖理傷道之事以虐民壊俗者有之軍民苦楚之情壅於上聞不能自訴詡區區管見恐不能不為執事髙明盛徳累是以鬱鬱心懐不恤衆怨而敢於執事前一一痛陳之也儻不以人廢言或有補於萬分之一伏願矜其愚不録其罪而施善處之道焉幸甚幸甚一輔道聖躬必法堯舜詡竊謂聖不自聖乃所以為聖賢不自賢乃所以為賢譬之忠臣孝子茍自以為忠孝則不足以為忠孝矣洪惟今上皇帝以聰明仁聖之資守盈成太平之業春秋鼎盛萬嵗方來正聖躬修已兢業之時而臣子盡心輔道之日古之君子愛其君者必曰責難陳善必曰我非堯舜之道不敢以陳奈何後代臣子其於人主前稱頌徳美之文常多箴戒過失之辭常少如此者恐非愛敬君父之道聖朝家法容受直言未必有此今執事位居列卿職膺重任身雖處江湖之遠而心不離乎朝廷若詡草莽微末未報涓埃亦切葵心如䝉俯納愚言願達聖聰乞勅經筵前後左右内外百司之臣凡有輔道聖躬者自非聖祖仁宗家法所守堯舜禹湯文武之道周公孔子之書不得有所引喻講說其他如虗談空諦之言功利詞章之習粉飾文具之語足以惑聖聽累聖徳而無益於聖治者一切屏絶仍乞皇帝陛下敬謹一心不罪忌諱俯而聽仰而思尊徳樂道不自以為堯舜而必求至於堯舜如此則三王可四而五帝可六矣一民風不古可為深憂詡竊惟古人以禮義廉恥為國之四維蓋國猶舟也茍不資其維繫之力則隨波逐流而不知所止矣詡愚以為四者之道使其常植立於天地之間則尊卑有序貴賤有等親疎位定取舍分明忠臣孝子有所據守而得勉進於善亂臣賊子有所畏懼而不敢肆恣其惡然則此四者有繫於國家之大體如此豈可輕視而不為之深憂哉今執事職居巡撫風俗民瘼最為急務如䝉廣詢道徳儒碩講明此道深原其所以致之之由詳討其所以變之之術凡有當為勿事茍安姑息粉飾文具必須端本澄源深懲痛改以圖久長使天下之居巡撫任者咸取則焉則措國家磐石之安致民俗為唐虞之厚自執事始也國家天下千萬世幸甚幸甚一鄉飲酒禮殊乖本意詡竊惟古人有言禮與食孰重曰禮重蓋食所以養生禮所以節慾茍惟生之是徇而不知節文則與禽獸又何以異是以古君子有寧餓死而不食非義者不以此乎欽惟聖朝創立天下鄉飲酒禮其本意蓋欲納民於善使之知長幼之序識賢愚之分接目而警心得以激勵興起耳有司宣上徳意宜嚴敬其事而舉行之不在殽酒之豐盈惟在禮意之勤篤賢賢老老期在得人進退揖讓必於中節斯可矣竊見近年有司嵗時舉行且如殽核多寡宜有常數其所費自當一出於官不以煩民今乃一牲一牢一飲一食無非科取於鄉里少有不愜則怒形於色而加箠楚又若延致賢老自宜盡賓主之禮來則迎歸則送不敢怠䙝今乃命一𨽻卒持一紙票既無起居之談又無慰藉之語書名草草如召僕夫况其所被召之人類多無恥之徒不知自重聞命奔走汲汲不暇至於即席之餘起止無常語言無度殊不足以為斯民觀感興起之地遂使有識之人旁觀竊笑以為餔餟之務若然則於聖朝創立斯禮本意安在哉執事如䝉俯聽愚言轉達朝廷通行天下一以明禮食之輕重二以務賢賢老老而得人三以重延致之儀四以嚴科取之禁如此乃可不失本意而風俗可淳於古聖賢勸懲教化之道或有合矣一養濟旌善名實不副詡竊惟天下之事蓋有似緩而實急者如文王發政施仁必汲汲於無告尼父之論兵食必先乎信之辭自非聖人仁知兼盡豈能知此為政之先務哉欽惟聖朝制度首以天下鰥寡孤獨篤廢殘疾與夫義夫節婦孝子順孫最為急務必立養濟之院使顛連者得以全生必立旌善之亭使為善者得以志行此先聖後聖揆之同道者也奈何比者天下有司多不能上體聖心祗順徳意於斯二者往往徒事虚文備故事且如崑山一邑養濟院所收養之人不過十數輩而已詡嘗見道路之間有等足不能行手不能舉口不能言目無所見耳無所聞隆冬盛寒踝跣而號乞者不可勝數夫聖朝一視同仁遐邇無間一夫失所曰予之辜豈以一邑之大所宜欽恤者止此數輩而已乎蓋由有司吝於出納而下屈於勢力不能自訴耳又若旌善亭各處州縣莫不有之然詡亦嘗造其地而閱之不過空空一亭而已夫以十室之邑必有忠信豈有堂堂大邑其間孝義之人遂無一二可書哉以是言之則養濟也旌善也名與實可得相副乎今執事仁義之事勇於必行如䝉轉達朝廷通行天下凡遇軍民有鰥寡孤獨廢疾失所者得以自言記名官籍將各處倉庫積餘布粟每月隨宜施予勿責其償仍禁豪武之人有所侵虐凡有義夫節婦孝子順孫足勸薄俗者人人得以上陳考察其實大書詳述揭於旌善亭内依例存恤給復其家仍觀有司能否以為殿最如此則見聖朝仁厚之政不異文王時而執事平日所藴推於政事間者亦不失聖門之深意矣一學校師生不遵法令詡竊惟法立而不守則為非法令出而不行則為虛文欽惟聖朝建立學校一欲造就人材以待國家任使二欲尊尚名教以為風俗依歸所以舊制畫為條教刻立卧碑諄諄懇懇誠萬世學校師生之範模也使其一一遵行何憂人材之不就風俗之不厚哉奈何居師位者惟知趨附勢利不思盡職或因祭祀而増價直以賣猪羊或托興作而侵隣地以栽菽麥或縱放畜産以踐食田禾或生放私債以倍取計息或出入州縣囑托公事或箝制官吏恣肆已威積習成風其來久矣以致生徒無所畏懼放肆靡所不為或戲侮於大成殿之前或謔笑於明倫堂之上至有䙝服夜遊於街里薄行明播於鄉閭問其詩書漫不可否質其疑難莫知如何其視卧碑諄懇之訓置之壁下同於頑石良由師教不嚴無足取法故也詡愚以為禮義由賢者出今反自學校壞之諸生習見如此使其幸中科甲而得美官愚不知將何者以為事君治民厚俗敦化之本哉今執事職居巡撫聲教本原之地尤所當謹如䝉轉達朝廷申明卧碑事例令天下學校奉卧碑築亭立於明倫堂前每月朔朢令提調官率師生行禮碑下講讀一過如遇監察御史入學責令師生黙誦如不能記憶者宜即時罷黜如此則法立而人得有所遵守令行而不至為空文矣一牧民之任當嚴按察詡竊惟天生斯民立之司牧蓋司者治之牧者養之斯民為天之赤子天能生之而不自治自養故舉而付於君是以君斯民者惟以生民苦樂稼穡艱難為事一民飢甚於已飢一民寒甚於已寒見惡必去以其害民也見善必用以其濟民也一食必念農耕之勤一衣必憐婦織之苦奢侈不萌乎心暴殄不及乎物懼防農時不敢輕有逸遊恐耗民財不忍易有興作必施寛厚之政以盡養民之方必選忠厚之人以授牧民之任可不慎哉奈何天下牧民之官多不上體天心惟徇已私其視斯民疾苦非特如越人視秦人肥瘠抑又從而害之以致乖氣作而嵗時歉民不聊生甚非聖天子惟恐失民心違天命之意今執事下臨民情休戚尤宜究心如䝉出巡到處若遇有司果有善政及果為民害者隨其輕重信賞必罰勿徇虚詞浮譽以受其欺必須旁詢密察以期得其實更乞轉達朝廷凡授民牧之任必須慎選其人凡經犯貪汚刻薄之徒不得復有濫受如此則民心悅而四海無虞天意得而萬福駢集矣一風憲出按宜禁私謁詡竊惟古人有言有守者可以執憲無私者可以閑邪盖所以先自治而後治人未有已不正而能正人者也聖朝稽古建官創立内外風憲之職以託耳目之寄維持綱紀甄别善惡震肅百僚自非守正無私者豈能當此重任哉其居内也必蹇蹇諤諤正色立朝如風霜之嚴厲如鵰鶚之無偶雖王公大人之貴不敢有所屈俾咸知懼以屏息其邪心其在外也威名所及必使豪横望風攝伏姦宄聞聲逃遁雖遐陬遠域千里之外莫不知有國家法度之不可犯如是乃為不忝風憲之任矣詡竊怪比年嘗任京官丁憂省親及承差遣便道還鄉者每遇風憲官出按所在必三五成羣干求謁見其風憲官不知自重往往與之笑談飲啜移時方退次日則躬造各家以答禮意甚至有甘為屈膝以拜其婦人其京官因有所恃或縱不肖子弟肆横於鄉里小民畏其勢焰吞聲飲恨順受其害亦有等姦黠豪右之人身犯刑憲自知不免聞知某京官與某風憲交往情熟不惜貨財以託請求遂至顛倒是非撓亂典則亦有風憲官本不知情被人假形託跡因而脇取犯者財賄以汚名節雖無慊於本心亦何可不致謹於疑似今執事禁革奸弊在所必為如䝉轉達朝廷申明憲綱事例使内外之居斯任者有所持循深體實行則法度正而朝廷尊姦慝屏而寃滯申矣一東南水旱必須預防詡竊惟天時水旱何代無之人事隄防從古而有凡事豫則立不豫則廢聖朝自洪武年間東南田地高下不一雨多憂澇晴多懼旱頻年河港湮塞岸塍摧圮無所資其灌溉注洩遂至永樂三年大水十四年大旱人民流離餓殍盈路稅糧逋負鹽賊横生朝廷憂之特遣大臣專督東南水利是以連年田地頗得成熟人民頗得聊生近來漸覺疎慢各州縣雖設治農之官而無治農之實一切文具茍且反生擾害倘一旦或有水旱恐不能無永樂三年十四年之患執事如䝉聽納愚言審處專一經畧水利勿事虛文務求實效則灾未至而有以備之而流離盜賊之患不足憂矣一澄汰冗卒以養精兵詡竊惟兵貴精而不貴多此先達之至論也人生年自四十以上精力盛强志氣剛銳立功建事惟在此時至年五十則肢體憔悴形神衰憊迨乎六十則耳聾目瞶疾病交攻其事將理之不暇况望其用哉今天下之兵精冗率相半使省冗者之食以資精者之用使無父母妻子凍餒之憂而一意練習以圖事功則兵為有用而食亦有餘若一概視之精冗不分甚非經常之道執事如䝉轉達乞命知兵會同百司商𣙜此道合無將天下軍分為三等其精壯軍士為一等别委能事官一員專一習練周嵗月糧得以全支仍令天下清軍御史往來程試能否如有不稱罪坐職掌其年二十以下五十以上者為一等除巡營唱號把闗守門及一應優輕雜作外俱撥附近多餘田地量力强弱與田肥瘠給與屯種收其子粒上倉以備精兵糧餉仍禁管屯監收官員不得妄有科擾或遇凶年得照民間事例處置其年六十以上并疾病無用者為一等有丁則取以備伍無丁則放之為民聽其依親住活仍將所請糧餉加給精兵器械衣裝費用如是不惟軍食常足而兵為有用抑且存恤老稚使各得所亦庶幾夫九經稱事之意矣一官軍運糧費用苦楚詡竊惟善為政者欲盡人力之用當念人情之艱本朝洪武年間官軍海運糧儲涉歴風濤性命不保却懽忻鼓舞而不以為難者蓋為官為造船不吝賞賜家支廩餼行有裹糧既無父母妻子凍餒之憂又無一應麻油木鐵需索之苦及至回船之日又有已資貿易隨路土産得以贍家所以雖蹈不測之淵死而無悔近年裏河運糧去危就安本以便益然軍士反加愁苦不若海運之懽忻者蓋由官無賞賜糧不全支加以造船所需費用百出盤洪過閘剥淺遭風日夜勞苦不得少息比及抵倉之日監收官員人等又復刁蹬取索停留曠日或遇風雨在倉覆蓋狼籍耗折又責陪補所得行糧計其口實費用十不及一所以不免假貸倍償計息經年累月力不得紓甚有夫朝出門妻子暮即求乞者又有計無所出甘於自經以就死者比之海運十倍其難運軍苦楚如此執事於軍民痛癢舉若切身如䝉轉達朝廷得照民間運糧事例將各處州縣義役倉場并積出餘米省節浮費每嵗量船大小給與價值常令有餘責令官軍自行打船修整及運糧官員軍士加給按月俸糧勿以折色得以全支仍禁各倉監收官員人等如遇糧舡抵倉隨到即收毋得刁蹬取索停留曠日違者治罪如此則軍力得以少紓而執事所以愛䘏軍民之意益昭昭矣一官軍屯田子粒繁重詡竊惟聖朝創立官軍屯田一以藉其子粒二以自給月糧誠為兩便然其中艱難苦楚有不可勝言者蓋常例每軍種肥田則十二畝瘠田則十五畝俱科子粒六石上倉餘者抵給本身週嵗月糧每月八斗計米九石六斗其給與之田或遠在百里外或七八十里外跋涉往來動輒經日况其田高低不一水旱不時較之中嵗僅可得米八石之數除工費本力外抵還官數常恐不及已身週嵗月糧夫復何望及至上倉之日搬運損折所費不少忽遇歉收之年尤更狼狽是以不免迫於凍餒强者敢於觸法為非弱者甘為溝瘠以死如是之情誠可憐憫愚以為軍民一體比者朝廷既念天下農作之難得減糧額十之二三而屯田之卒比之農夫又何異哉特上人慮未之及爾今執事軍民利病無不軫念如蒙轉達朝廷乞為量加優䘏或官給與本力或増與田畝或輕減其子粒隨宜處置則上不嫌於取盈下不憂乎受害而聖朝一視同仁之政無所偏矣一官軍俸祿不足養贍詡竊惟常人之情食不足則力不齊恩不浹則心不固今天下管軍官員不事耕織惟仰衣食於俸祿近年以來例不全支加以獲罪住給人口數多日用不周父母妻子啼飢號寒之聲不絶於耳自非鐵心鮮不為動是以不顧廉恥不䘏法度或詐取人財或刻減軍餉甚至有公服冠帶甘為卑辭下氣倚人門牆以乞升斗之粟把握之薪者設有緩急差遣置之死地將何所固其心而盡其力哉今執事於一夫失所尚形惨慼况乎此輩所繫尤重者乎如蒙轉達朝廷乞為念其至情審其大體按月俸糧得以全支必使衣食飽煖生死無憾然後責之以禮義威之以法度作奸犯科者不使僥倖獲免如此則不失國家報功之意而徳威兼舉心可固而力可盡矣一各處有司擅興土木詡竊惟節用而愛人使民以時此先聖之格言為政之要務也近年有司往往擅興土木營不急之務科率役使動經旬月費用不貲疲力損財莫甚於此愚以為此財此力非出於官員之已有實出於小民之身家若使移於稼穡耕作之間則其補益豈小今執事除蠧救民如蒙轉達朝廷通行禁治凡天下官府有所興造自非申奉朝廷區處一毫一釐不得妄科一軍一民不得妄使敢有違者必罰無赦如此則小民得安其業而遂其生矣一差出官員酷用刑罰詡竊惟聖朝制律五刑之外別無他施笞杖之刑必較大小蓋所以重民命戢姦暴也近者差出官員往往不循禮法喜怒由已肆逞刑威將無罪之人纂夾耳鼻剪拔鬚髮創為三湯兩割七八不閑之號遂至箠楚之極使人痛不能禁糞溺俱出逼令食之無餘或有盡燒其裳衣使之裸形而奔走使人神魂飛越莫知所措酷暴如此何罪不承遠近轉相倣效以至鄉里豪奪之人亦設此具以虐良善且如男女帷簿不謹在上之人厚宜自責由我教化不明即不得已自宜遵正科條斷豈可畫其眉目裸其形體簮其花朶昭示通衢使市井小人千百成羣聚觀喧笑非戒淫也實誨淫也此何理哉又如正法婦女有罪坐其夫男此朝廷令典忠厚之至所以曲全廉恥今乃男子被撻或得隔其裳衣婦女受笞必使露其肌肉觀其舉措如此則其淫忍可知又如犯法宜明正其罪豈可罰使出銀出粟以資妄費而使得幸免若然是以朝廷之法為吾易銀易粟之具也有孤聖朝欽恤之意抑且斵䘮元元之心執事如蒙轉達朝廷乞為申明洪武年間非法用刑舊制通行禁治凡差出官員本分之外不得干預有司雜事違者罪之庶幾民無横憂官無酷政而朝廷仁厚之澤流行於天下矣一官員饋􅀈科索損民詡竊惟小民生理惟事農業終嵗勤勞所得有限且如秋成之際一以輸納官租二以補償私債加以婚喪弔慶户役疾病費用之外所餘者能幾甚至嚴霜凛雪無袴無履而忍凍一冬者又有寒冷之極呻吟至晚而不得一寐者又有暑月無帷終夜達旦苦膏血以飫蚊䖟之腹者又有官府逼迫計無所出而甘鬻妻孥者奈何為民父母一不之問但見有等官員或因榦辦公事經過謁見或因丁憂秩滿貢舉起程往來干覔却乃厚加饋􅀈原其心不過欲得其歡心以為他日倘居要路或可得其稱譽薦拔脫罪解紛之助而已問其所饋􅀈之物既非出於官員兒耕女織之所致無非刻薄小民脂膏科索而得之愚以為尊貴之人地位清高豈知蒼生之苦哉執事視民如子惟恐傷之如蒙轉達朝廷通行禁治不惟小民得以免横斂之害而朝廷亦得以杜其交結蒙蔽之私矣一官吏犯法不當贖罪詡竊謂無知而犯法者情或可恕明知故犯者罪不可容書不云乎眚災肆赦怙終賊刑欽惟聖朝創立運糧贖罪之條本以哀矜小民無知誤觸刑憲而設非故欲自弛其法而利其財也近者不才官吏往往慿藉仁恩明知故犯敢於為惡及至事覺亦得隨例贖罪其所費者原非已出多係倚勢奸民出財營救既贖之後益知財能救死貪汚愈甚繼以奸民倚其營救之徳違法暴横凌虐小户其官吏因而受其箝制拱手聽順莫敢如何蒼生何罪受其荼毒今執事洞察人情宜轉達朝廷通行天下掌刑衙門但有官吏犯法不得隨例贖罪一以科論如律罷降職任不使靦然無恥復居民上則奸吏知懼而小民獲安可以激勵將來矣一清理田糧未愜公道竊惟天下之事欲求久而無弊惟在公而無偏必順人情乃可愜公道譬猶權衡之稱物一毫一釐有所低昂欲人無議其後不可得也以此言之為政者豈可徒矯一時之見而忽後日之患哉竊見洪武年間蘇州府有同知宋信取勘崑山縣荒閒田野足民衣食而已初無害人之意蓋由本官但知其一不知其二既受之後奈何田段散遠高下不同甚至有額無田虛包糧稅民力不勝往往流離轉徙禍及隣里四十餘年反為民害怨聲載路莫不曰宋信不重民命惟務聚斂使吾民忘家失業流毒至此哉幸䝉執事洞知民瘼欲革前弊特賜清理若老若小罔不歡感以為回病勢於將死之時續縷息於欲絶之際奈何任事之人昧於大體務於小察不深體執事惓惓體國憂民之意人情不能無疑且如兩家之田連坵接畝一盈一虧既曰清理則當剖彼之盈補此之虧今乃以虧者則謂之舊因而積年賠納之數不得議減盈者則謂之積出而新立科取之額甚至將原量一定之數再三改易翻謄斯門一開奸弊百出若曰於心無愧則其舊日封圻藁籍自宜存之於官以備㕘考何乃悉付諸火以滅其蹤遂使豪右得計貧弱受害物議喧騰若當時誠得一二公平正大廉謹忠厚之人治之有條理壓服衆心不惟執事立法之初意可暴白於斯民而高明盛徳不至為其所累矣况又聞之道路云官府欲將恩例入額役田槩増科額民心皇皇甚不能安愚以為一之為甚其可再乎且斯民者乃國家之所以為國家者也究其衣食之艱惟患輸納之重朝廷深知如此比年天下糧額得減十之二三民感皇恩淪浹骨髓今之此舉若不深惟其後而遂必為之政恐年深弊積後人之怨今人者亦猶今人之怨昔人也如蒙俯納愚言乞慮厥始終勿徇常見而施其善處之道焉則執事不徒為蒼生之口碑於萬斯年而㝠㝠陰徳之報亦有歸矣一鹽法禁令未能兩全詡竊惟古人有言禁人之所必犯法必不行又聞仁人之御下猶慈父母之於子女其愛惟均衣服飲食必須兼濟一有不愜向隅而泣為父母者其心得安耶詡竊見近者執事欽承上命深懲積年鹽法不通之弊重勞宏慮立法禁止且責州縣能否以為殿最詡愚以為鹽法之所以不通其弊非一蓋由官鹽多雜灰土牛糞等類穢汚之物色惡味劣鄉人樂於私鹽之瑩淨且負擔往往到門求售隨物貿易可或容賖非特銖兩饒足抑無往返之勞此鹽法之所以不通者一也數年以來官府計口責納鹽鈔笞楚逼迫甚於星火鄉人無由得鈔不免將産畜布帛薪粟麻麥加賤貿鬻以救一時之急既納之後徒為主收吏胥刻落肥家之利而已官鹽何嘗有銖兩之給還哉此鹽法之所以不通者二也又若天下鹽商引目苦費本力忘其父母妻子經寒歴暑忍飢受凍遠從千里邊塞營中而得奈何各處鹽場拘於先後恣意阻滯至有二三十年守待不得支而甘於自棄者此鹽法之所以不通者三也洪武年間四品以上官員之家不得中鹽以侵商賈之利近年往往見有鹽商多稱官下舍人原其關支之際不無凌壓侵越以致阻滯此鹽法之所以不通者四也以此言之固不可獨責之於下矣抑詡自童幼時聞長老言鹽丁灶户類多窮苦終嵗勤動父母妻子不得煖飽惟仗餘鹽以活性命古人有詩曰生女嫁盤瓠誓莫近嫁宋家亭則其苦情久矣又若沿海衛所近年軍士糧餉例不全支運糧造船耗折賠補費用百出每月所得八斗之糧不充一索之費飢寒切身哀音滿耳是以忘其法禁敢於負賣私鹽一日奔走動經七八十里所得微利不過四五十文一家長幼待此為命今執事必求令行禁止則是絶其衣食之源而使之就死地愚以為此輩本非素知禮義之人孰肯就道而死萬一困極禍出意外弱者散而之四方强者聚而為盜賊放肆猖獗以思快其所忿而致居民不得安枕帖席所得者小所失者大不無動勞執事措置規畫之廑也且夫州縣之職在乎分憂固不當以細務而責其優劣如古之撫字心勞催科政拙者豈可以為不肖而黜之乎况今各處有司聞斯令之出於是黨結牙儈益加夾襍又將挑販小民預勒見錢以為鹽本因而得以為肥家之利其他生事科擾非止一端以致苦楚之極舉家哀號無所控訴則是法未及行而民先受害詡雖愚昧未見其可也聖天子愛恤軍民一夫失所形於咨嗟所以特令執事下臨巡撫務在敉寜如鹺務細末固非所急乞為深惟大體痛念至情務求兩全勿徇一見合無令各處出鹽所在煎煑務從精潔其鹽丁竈户除該納常額外或有餘鹽請得官為設務專委公直廉謹衆所信服者一士人主之將各處倉庫官糧并積出餘米一照民間價值勿恃官勢兩平收買堆積遇有鹽商來支勿拘先後無使經年守支阻滯隨到即給如該場或有不敷即將所關堆積餘鹽給與彼此相資誠為兩便仍乞申明洪武祖制食祿之家不得中鹽事例以禁侵越其沿海軍士月給糧餉例得全支或遇凶年得照民例概施賑濟仍將近年小民納過鹽鈔之鹽一一如數給還勿吝出内無使失信如此則商賈流通人得所養民有餘鹽私無所售法不待立而自行禁不待嚴而自止矣墓銘沈魯先生龔姓諱詡字大章别號鈍菴世居蘇之崑山婁縣村高祖諱榮祖曽祖諱應春祖諱徳新父諱詧字叔言洪武戊午應文學科授岳州儒學正妣王氏宋參知政事綯之後洪武壬戌十月十一日生先生於岳州叔言擢兵科都給事中以事謫戍五開時戍者不許偕親屬行先生甫三嵗隨母夫人歸依外氏而叔言訃音尋至夫人守節不貳紡績給衣食課子讀書先生性通敏過目輒成誦雖罹多故於窮愁無聊中亦能自奮勵但尫羸孱弱不任繼先人戍遠乃斂膝授徒於鄉三十年母子更相為命時軍政督急促補缺伍縣受文牒至四百七十母夫人日夜刻勵用財以自衛而堂兄瑀為之周旋維䕶得緩行宣徳間因清理俾戍附近𨽻鎮海衛籍總督武公惟徳雅敬愛先生嘗令其子餽問安否周文襄公恂如巡撫東南先生挾䇿言二十餘事切中時病舉衛學教授不就繼後巡撫者亦皆有書論世務所言不售乃自賦云胸中有長劍一日幾迴磨先生剛腸嫉惡而言必以忠信孝友重惜名檢於子弟尤諄誨親切為文抑揚反復曲折詳盡讀之愈繁而愈宻尤長於詩詩多闗風教道民情好惡而惻怛忠厚有少陵憂恤之心焉晚築室於小虞浦藝卉木蔬果題為逸老庵日以吟咏耕稼自娛而聲利紛華泊如也年雖高而耳目聰明矍鑠徤步出入未嘗乗輿馬勞物力一旦小有不安顧左右謂曰吾將逝矣早跋涉艱危勞苦萬狀瀕九死幸獲全遺骸於今日復何憾成化己丑正月癸未卒於正寢享年八十有八所著書若干巻野古集若干巻以老兵乏嗣得免繼補軍伍配胡氏有懿行再娶皆周氏亦先卒養女三人壻周智周常倪允而智壻劉偉常二子雍陸與允二壻邵祖及雍子周文傳皆能繼其醫業是年閏二月壬申塟鹿城先塋之兆武公與宗人隂陽訓術彦中為經理襄事而邵祖之父曽生狀行請銘余先君與先生中表兄弟夙相契合講道􅁩終日談不厭余嘗聞其緒餘迄今猶能記憶敢忘其陋而輒為議諡復銘其墓曰蚤罹世故多危疑中更困伏幾不支雖有利器將安施詩書之樂慰我飢文章節義慰我悲年垂九十志不移嗚呼先生後進師諡議有明成化五年正月癸未鈍庵龔先生大章以疾卒於家享年八十有八無子其宗人以敬暨隂陽訓術彦中為營喪塟塟於崑峰之南鹿城之下而門生弟子相與議諡以易其所以為名者謀及余且屬以諡議余謂士君子之行義顯而易見為可名則人皆能言之矣隱而難知者無以紀其志必資有識發潛啟宻使後人得以向慕庶幾其有不忘者存焉先生自少出入行陣冒死盡瘁而不忘所自犬馬識其故主言之未嘗不哽咽流涕然於窮途涸轍中能自奮勵務為有用之學匡濟之才屢見其所長以干時用卒亦知其莫能售也乃斂鋒鍔居恬易以鈍自處讀軒岐醫藥農圃樹藝之書為利人徇已之道尚名檢厚風化忠信孝義之談日不虛口世方以利名得喪為榮瘁先生語後進子弟曰女宜盡心於其親勿欺罔以窺祿貧賤憂戚命也處之有道在乎其人焉無他為也委順而已此其行􅁩於諡法寛容和平曰安好廉自克曰節夫虛中受益從容宴如和其氣不迫於事非安而何衣疏食糲苦學甘貧紛其身不逾其志非節而何於是崑山逸老沈魯題其窀穸之所曰鈍庵安節龔先生之墓僉曰宜哉遂議諡俾彦中子姪紱綬縉用刻於石托外孫周雍守之成化五年歲在己丑閏二月望日立傳王執禮龔詡字大章號鈍庵洪武十五年生於岳州兵科公謫時纔三嵗母王氏盡瘁育之抵於成人年十七詣闕陳乞就伍時北兵日近因留京師守金川門建文四年六月十三日谷王開門迎降守者崩潰時詡年二十一嵗投戈慟哭回顧宫中火起傳言乘輿巽去詡即亡命出城徬徨郊外莫知所之乃變姓名稱王大章遯歸鄉里伺後興復已而知府姚善被執乃轉匿任陽大姓陳馬二家常言畜狗尚戀舊主况於人乎道及先朝事即悲不自勝時召捕補伍者甚急崑山四百七十人詡在其中義不欲往族人瑀隂為賂脫晦處二十餘年賣藥授徒以給朝夕人知王大章即所捕龔詧子也然憐其志尚無訐之者宣徳七年䝉恩例移附近鎮海衛終不就籍後周文襄公巡撫江南屈已下士咨詢民瘼因條上所宜興革二十餘事文襄以為賢屢薦署淞江太鎮衛學教授皆堅辭不去文襄躬親往勸始吐實謝却猶迫之不已乃曰某固非食祿之臣仕亦無害但今從明公辟舉則負往日城門一慟耳因泣下沾裳文襄感服嘆息而去無子不立繼嗣惟養兩女贅壻為倚至成化三年正月二十八日癸未壽終整衣端坐口誦大學首章而逝有白氣起屋極上衝霄漢自號鈍庵逸老詩名野古集生平忠憤時或不掩其鐵心行云我有胸中一塊鐵贈君鍛鍊成寶刀總然埋没不復用終使神光夜燭星斗高其話舊云誰知痛定還思痛毛骨於今尚悚然其有感云六十年來不平事至今提起便長號可以窺其藴矣吳文恪公訥深敬之門人私諡為安節先生是年閏二月壬申宗人紱縉為經理襄事塟儒學西先塋之昭𢎞治初年知縣楊子器立祠於富春橋下比嵗久湮没十一年祀之鄉賢隆慶六年詔書褒顯革除時忠臣義士劄下所在撫臣建祠表墓恤錄苗裔乃復立祠學宮之西近其母子塟處又張大復龔詡字大章父詧官黄門以諌易儲事戍五開詡方三嵗時法嚴戍者不得以親屬行先逮公母子四人既就道多病亡而公最幼獨免會赦東歸遇黄門西楚道中匆匆泣别未久黄門死五開公從母依外家居春和里而勾伍之籍旁午於道積移至四百餘紙責縣官甚急頼宗人清惠公保持之母又多賣金自衛征發稍緩年十四白母詣闕候補得遼陽踰年建文君閔公直諫子又穉小不堪遠戍調守金川門公即金川門守戍時乃志在王室凜凜多匡衛之算靖難師起從軍淮隂㑹綂兵敗績力收餘衆復守金川壬午六月十三日靖難兵逼金川門谷王穗以門降守者奔潰公奮戈擿之不中低回走郊外冀得一當以安社禝俄宫中火起乘輿遜避始大慟遁去匿江隂常熟間然時聞竊竊追討聲夜走任陽寄馬陳二家二家故多藏書頗修朱家郭解之義乃匿公大囤中公即讀書其間上討皇古下漁百氏几榻盡穿多所纂述而又時時乘夜渡婁省母旁皇舊遊家冷吟孤嘯嘗有童汪非怯當年事為有慈親在故園之句讀者傷之仁宗即位詔寛軍伍公始仍侍母崑山而是時周文襄忱籍田江南具禮相就公為條上便宜二十事次序行之東南以安居無幾有詔調公鎮海軍而母王夫人卒公班白毁瘠孺慕終身自惟髫穉之年見比閭子皆有怙恃我獨何人春露秋霜感思深至觸事悲號幾回病絶母子甫合何辜至此既久之文襄欲處公師儒之任已定議蘇松間公不可文襄躬辟之公泫然曰即詡非食祿之臣仕亦無害但恐負徃日城門一慟耳遂去不復見築逸老庵虞浦上讀書鼓琴其中著野古集若干巻大都忠憤之氣光芒陸離不可磨滅云公身歴八朝年幾九􅐆没齒沈淪綱常攸頼前際後際才有摠萃者焉論曰揚子雲言君子在治若鳳在亂若鳳豈其為安節先生言之也吾觀先生蓋經世之雄不遇蒙難既明且哲以保其身要以還矢黄門不負天道而世之論者逡巡觸諱不欲正明其當日投戈歸田之槩編籍隱遯不知就所著書已見行事非獨埀空文以自雄者也文襄百世之澤藉有先生亦少槩見矣穆廟神聖首詔䘏錄壬午諸臣故先生得在廟食之列當時撫臣張佳𦙍抗疏請祠張黄門棟始得盡傳其事無所避諱此所謂景星鳳凰爭先睹之為快者耶嗟乎五開百年之目至是可瞑而建文皇帝故不乏王宮守衛士矣天道神明焉可誣哉當撫臣題祠時江右龍宗武實署先生事其詞曰龔詡至性天植篤忠義於童穉之年高標代希挺耿介於阨窮之日身非官守痛國難而悲慟無窮運屬天移矢臣綱而堅持罔變至於藏名易姓竄伏江鄉辟聘數臨力辭不起方之周武應天順人而夷齊獨恥食其粟真可謂千古同節者也及攷伊父以直諫死遠戍伊母以氷節撫孤童孝義忠貞一門並萃豈非蘭生幽谷無人自芳者耶其視死事諸臣雖得禍不如其慘而抗志各極其崇慷慨殺身從容就義故難以優劣論矣於是撫臣是其議請於朝制曰可畫像贊吳瑞不絶其名而絶其嗣與林和靖同而先生則三娶乎妻不昌其身而昌其詩與孟貞曜同而先生則不忘乎時其容之和藹乎陽春三尺之童可與俱其介之峻巍乎華嶽萬夫之勇不可移此其所以生稱逸老没諡安節而可為百世之師者也又王曰敏幼罹父難克遵母教長從正學力任師道儒言儒行深衣幅巾逍遥鄉里儀表縉紳其􅂖不辰美玉韞匵行稱乎諡壽享乎福嗚呼先生世冑黄門雖曰乏後身死名存野古集附録
