body:
  text: 野古集别集類五明提要臣等謹案野古集三卷明龔詡撰詡字大章崑山人父察洪武中官給事中以言事遣戍五開衛詡遂𨽻軍籍後調守金川門燕王篡位詡變姓名遁歸賣藥授徒以自給正統巳未巡撫周忱薦為松江學官不就又薦為太倉學官亦不就嘗語都御史吳訥曰詡仕無害于義但恐負當日城門一慟耳成化己丑始卒年八十八明史附載牛景先傳是集乃崇禎乙亥其八世從孫挺所刻前有李繼貞序稱刪其十之二三蓋詡詩格調在長慶集擊壤集間其傷于鄙俚淺率者繼貞稍汰之也要其性情深摯直抒胸臆律以選聲配色雕章琢句誠不能與文士爭工律以綱常名教之旨則不合于風人者鮮矣末附上周忱書及王執禮張大復等所作家傳墓志諡議像贊等篇又有年譜稱詡族姪紱所編于建文四年稱傳言乘輿遜去于正統七年稱舊君還京先生作落葉吟見意按紱之作譜在成化十三年楊應能事應久己論定不應有舊君還京之語且落葉一詩本無明指安知非别有託諷而顧據此斷為惠帝出奔還京之作亦未見其然此譜于康熙乙巳挺得本于其族弟維則故崇禎乙亥原刻總目不與墓銘家傳等並列觀是一條其真為紱作與否猶在兩可間也疑以傳疑姑並存之而己乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀野古集序世之罵疏俗粗鄙者類曰野而目方直廉介者類曰古余生草野間所交與者黃童白叟而已是故蹤蹟罕涉乎勢利之途談論不越乎耕牧之事衣冠不隨乎時禮貌不狥乎俗與夫一言一動舉不諧人耳悅人目而適人意也或者以野罵之或者以古目之余聞而竊自揣焉罵我野者誠得我實不足深過而目我古者虛譽過情非余所敢知也於是兼取二字以命其齊庶為晨夕接目警心之助以求去其野而馴致其古己耳然余平生好吟所成就僅百餘篇其鄙俚迂誕直所謂吳歈巴唱也他日不恥貽騷壇作家之笑録以成編因齊名而題之曰野古集區區之心非敢以自擬也傳有之曰詩言志余之命意措辭之拙固懸絶於古人而野人拳拳之意或可少見矣天順癸未八月中秋日逸老龔詡大章自序野古集年譜青縣教諭龔紱撰鈍菴素履潔白至性忠孝以髙年夀終雖志傳班班可考而循年紀事之譜尚爾缺然紱幼辱化誨長荷薰陶親承遺教其容不文已乎乃稽其行事纂其言之發於忠孝者附之歲年之下述譜如左洪武十五年壬戌是歲十月十一日生先生於嶽州考諱察字叔言蘇之崑山人於洪武十一年戊午中文學科選授嶽州儒學正母王氏宋參知政事王綯裔孫諱慶恂之孫女生先生時年三十三歲洪武十六年癸亥先生時年二歲家於嶽州㑹升州為府州官偕入京改調嶽守見上問以民風土俗懾不敢言而叔言奏對詳悉上謂其有敢言之風遂遷兵科給事中乃家於京果良於獻替尋轉都給事兵科洪武十七年甲子先生時年三歲春三月叔言以言事獲罪謫戍五開衛胥靡以行母王氏與子女先逮至湖廣㑹赦得還鄉里與叔言㑹於塗相號泣以别獨㩦幼子女三人東歸道喪其二所存惟先生一人時國禁方嚴戍者不得與親屬偕叔言至五開不久而卒遂葬其所洪武二十年丁卯先生時年六歲與母氏居二保從孰師沈以中遊學性通敏過目成誦讀書即求悟解一日師出外羣弟子輒為迷藏戲而先生獨凝然莊坐略不寓目其頴異如此洪武二十四年辛未先生時年十歲遷居邑之春和里從西齊林先生遊通春秋經義每讀書至夜分必呱呱泣母覺發曰汝何泣先生曰人皆有天倫之樂而我獨無人享寧居而我旦暮有仳離之苦是以泣耳於是母亦為之泣是時五開以叔言物故勾補伍者無虛日先祖奉政公與其從兄瑀閔其寡弱隂賄用事得緩其行洪武二十八年乙亥先生時年一十四歲㑹勾補伍者益急乃去補戍遼陽充五開衛卒屬築城先生當運磚見主者憒於所事乃疏其方略挾書從事主者異而禮之洪武三十一年戊寅先生時年一十七歲北方有事兵亂戍卒皆亡先生亦亡冬十月詣闕請補近衛以衛王宫上嘉其義撥厯城侯盛庸部下調用一云此建文二年庚辰冬間事建文三年辛巳先生時年二十歲從征淮隂後敗績亡歸守衛王宫建文四年壬午先生時年二十一歲守金川門六月十三日乙丑成祖靖難兵至金川門谷王橞以門降先生操戈相向再擲之不中亡之郊外見宫中火起傳言乘輿㢲去即投戈大慟歸鄉里變姓名為王氏竄伏江隂海虞之間永樂四年丙戌先生時年二十五歲授徒於言城周敬修氏有寄聽泉沈兄孟舟曰君比參星我比商相思縮地恨無方十年湖海同漂泊兩地情懷一感傷㑹面未知何歲月論心安得共杯觴幾回雲樹窮吟目千里悠悠思更長永樂五年丁亥先生時年二十六歲題枯枝凍雀圖有曰歲寒風雪滿山林獨戀枯枝思不禁愁絶紇干興感處不知臣子獨何心永樂六年戊子先生時年二十七歲寓居常熟馬字昌氏母王氏獨居崑山有客中思親詩其一曰才看黃落梧間葉又見青歸栁上枝慈母鬢毛紛似雪小兒方寸亂如絲其二曰烏母含飢守故巢烏兒折翅墮林皋相呼相應空相憶夜冷霜清月正髙永樂十年壬辰先生時年三十一歲夜歸古婁逢陸漁隱話舊曰十年湖海共飄零無異紛紛水上萍今日客中欣邂逅故人情重眼猶青其過東易遺老故居有曰仙客騎鯨去不回墨池吟事久塵埃我來再拜庭前樹為憶先生手自栽遺老沈姓以中其字先生童子時師也至是淹忽己久身後寂寞悽然感悼不覺涕零為詩以志之永樂十二年甲午先生時年三十三歲避居琴水上時母氏年六十五歲獨居崑山適吳文恪公訥自海虞來教崑庠送以詩曰嗜讀先生舊典謨十年窗下自咿唔恥隨兒輩營青紫樂與英材作範模朝醉言城江上酒暮餐崑學圃中蔬送君不得隨君去垂淚空憐返哺烏後文恪以事止不果行永樂十五年丁酉先生時年三十六歲與友人袁宗魯别幾二十載十月望日一旦邂逅琴川寓舍追論疇昔不勝慨嘆既而寄懷有曰竄伏江鄉二十年艱難生計總無便童汪非怯當年事為有慈親在故園其寄友人有曰音書何處覔鱗鴻二十年來杳不通槽櫪有誰憐老驥江湖無不羡元龍皋魚風木君心苦仁傑雲山我興濃欲問相逢定何日只今萍梗正西東永樂十七年已亥先生時年三十八歲其述懷有曰自嘆微軀一羽輕去留無定似逰僧病隨春草年年長愁逐秋潮夜夜增定省久違思老母心胸日塞念良朋何時得泛歸吳棹重讀父書親夜燈永樂十八年庚午先生時年三十九歲客居湄水之上寫其隱事有鐵心行云我有胸中一塊鐵贈君煅煉成寶刀不斬狐狸及鼷鼠要斬南山白額長橋蛟視蛟如蚓虎如猫心不為動力不勞功成畢竟藏諸韜肯將割肉供君庖縱教埋沒不復用終使神光夜燭斗牛髙永樂二十年壬寅先生時年四十一歲詠採薇以自况有曰周家之粟苦如蘗首陽之薇甘若飴弟兄風節有如此千古此情誰許知靖節東籬醉黃菊四皓商山採紫芝孰云世代有先後彼此未必殊襟期君不見太朴日散趨澆漓流風餘韻無復遺世人但識癡頑老若見此圖應解頤永樂二十二年甲辰先生時年四十三歲客居琴川娶周氏素慎為妾洪熙元年乙巳先生時年四十四歲仁宗即位詔諭羣臣解建文被罪臣禁寬恤軍政秋八月同季仲怡箎往玉峰夜宿新塘阻風雨客有吟唐人縱然一夜風吹去只在蘆花淺水邊之句步其韻有曰一帆同載孝廉船夜泊新塘聽雨眠為動故園桑梓念不知清淚落腮邊仲怡亦和之曰楊栁磯頭繫客船打篷風雨夜驚眠西風不管情懷惡又送濤聲到枕邊宣德二年丁未先生時年四十六歲館琴川陳南野氏有客中思親詩曰憶昔離家三十秋轉眼少年成白頭一身湖海尚萍梗每愁不肖貽親憂遙憐朝暮依門處不見兒歸應淚流淚流有時乾思念無時休無時休常抱怨兒非不思歸自是無歸便太行回首見孤雲千古懷英共悲戀舉頭問天天不言何時得遂平生願奈此日月何匆匆急如箭北堂日夜切歸心杜宇無勞苦相勸宣德四牛己酉先生時年四十九歲母王孺人年八十一歲有哀親年邁曰一生子職苦蹉跎深愳慈親八十過若論兒心思罔極再加八十未為多友人季仲怡以慈烏返哺圖求題援筆曰主人庭樹緑森森返哺時來慰母心顧我北堂違菽水負恩深痛不如禽冬十月有詔恩清理戎籍其老弱不堪逺配者悉附近衛差操久捕不至者出首著伍免罪是歲都御史周忱撫吳宣德六年辛亥先生時年五十歲春三月都御史周忱均田額躬行畎畝夙知先生賢至是遍物色之得之於琴水上親造其廬問以當世事宜手條二十餘事上之忱以語久無供具隨行請食食以草菜而退忱以所陳事次第推行吳民至今便之宣德七年壬子先生時年五十一歲自靖難以來軍政督急促補五開缺伍縣受文牒至四百七十至是有司奉詔例清理軍伍乃遂以先生為老弱無嗣近附鎮海戎籍有歸婁江詩昔年曽住婁江上看到園林幾樹春今日歸來風景異梅花猶識舊時人其一草載江湖逐梗萍故園花木總凋零歸來獨有窗前竹不减猗猗舊日青其二宣德八年癸丑先生時年五十二歲後四月初七日母王孺人卒先生哀毁踰禮幾至滅性其病後有詩曰一病才蘇似酒醒却思遺體忽心驚幸生不必論諸事得寐何須問幾更己覺壯心隨日減久拚華髮滿頭生痛憐念母恩無極淚雨何時可得睛宣德九年甲寅先生時年五十三歲友人康友竹為寫畫像其自題有曰十年不見康友竹一日客裏驚相逢江湖落魄總相似生意不殊心事同為施丹青造化筆寫我山林枯槁容鐡冠布衲草為履抱琴瘦僕行相從寒風兩鬢吹蓬鬆雪中古木霜中鴻風流敢託歸來翁一團清氣蟠心胸功名不羡褒鄂公莞爾一笑浮雲空今年五十已過二六十相將在眼中君今還西我歸東一聚一散真萍蓬他時何處可得復相遇為我添箇尋詩笻宣德十年乙卯先生時年五十四歲其歸田園有曰客中常憶鄉關好每恨歸來苦不早十年世事付春夢數畝田園沒秋草今朝始得返吾廬𤣥髮驚看半成縞痛憐慈母卧泉關灑淚含悽向誰道老妻沽酒慰暌離弱息呼翁覓提抱胸中感慨幾多情一夜燈前盡傾倒十月娶淑新周氏有買妾詞冗不載正統元年丙辰先生時年五十五歲自丁未以來猶客寓海虞陳氏至是東歸别諸友有曰一别故園三十秋此生漂寄似萍浮奔馳自念多身纍憔悴誰憐久客愁舉世但知新締好維君不忘舊從遊相思後夜知何處明月清風隔古婁歸而與族姪彥中話舊有曰草年逃難海東陬往事重思淚欲流最是夜深何處笛為豫吹徹許多愁其一備厯艱危十載前此身常與死相連誰知痛定重思痛毛骨於今尚凛然其二正統二年丁巳先生時年五十六歲春築室於邑之北郊虞浦上藝卉木蔬果題所居曰野古齊日與伯父珩季父琚咏歌其中有田三十畝力耕自給而於聲利紛華泊如也其相依彥文諱理昆弟以居有曰早歲飄蓬晚得歸念叨同族逺相依難兄難弟心無二全孝全忠志不違既遇仲淹終見恤不慙伯玉老知非一菴己副棲遲計聊托耕耘代蕨薇秋八月二十四日偶憶前事言之痛心有口號曰三十年前萬歲橋村莊投宿記今宵當時老嫗知安在淚灑西風百里遙先生自注曰彼時余寓其家有老嫗甚有憐恤我意待之過厚其萬歲橋界於常熟無錫江隂三縣之交時壬午秋日也正統三年戊午先生時年五十七歲海虞郭令聞先生賢常不逺百里來訪之秋七月遺以粱肉親過野古齊談論竟日而去有謝郭公令詩正統四年巳未先生時年五十八歲巡撫周文襄公忱欽其才節兩薦之為淞江太倉學官不就以書辭之其略曰詡性愚識淺德薄才凉加以寡弱一身愁苦亂其方寸不忠不孝誠天地一罪人耳今也年幾六十旦夕之人一死之外無他顧也乃者執事謬以千慮一得之見謂可以居民上便欲置詡於後生模範之地則豈其所願欲者哉若今致仕都憲海虞思菴吳公稔知不肖之為人試以質之必將得詡之實矣夫庠序乃名教之地以詡處之則名教何在是以寧死敢咈執事愛厚之意决不敢須㬰離此以貽名教之羞古語曰君子愛人以德不強人以所不能倘或不棄則向之所言或一一行之則執事之賜不既厚矣乎忱訪訥思菴名訥以恐負城門一慟之語告之忱乃止秋八月淫雨浹旬作苦楚吟以遺當道民有發粟之惠思菴嘗謂先生曰以子之才何不仕先生曰詡仕無害於義恐負往日城門一慟耳正統七年壬戌先生時年六十一歲舊君還京有落葉吟寓意曰落葉復落葉階前積漸多雖知無返期未能忘舊柯誰知舊柯心己萌新葉意新故情不同能不我遐棄作書報新葉且莫誇逢時西風一朝起此情當自知正統八年癸亥先生時年六十二歲水潦彌日著癸亥民情詩正統十年乙丑先生時年六十四歲妾周氏淑新於宣德十年來歸賴其奉事之力者十霜是歲十月八日卒距其生永樂癸巳四月三日得年三十有三其哀淑新詩曰東風拂拂從東來名園草木俱花開花開豈無數日好爭奈晚來風雨催半隨流水半塵土舊枝一别無時回人生處世亦如此對之能不令心哀可憐吾家歲寒婦十載衡門共母苦昨朝猶見奉衰翁今日誰知卧黃土綵雲一斷杳無蹤愈逺思之愈悽楚一宵耿耿不成眠數盡譙樓五更鼓正統十一年丙寅先生時年六十五歲春三月十七葬淑新於所居之側其詞曰噫惟汝家於烏目之西兮其氏為周方九齡而義養於陸兮又十四而歸我於婁時余齒居百之半而又四兮紛白雪其盈頭汝能弗以枯楊之荑而芥蒂兮安命分而曽無怨尤痛吾抑而癢吾搔兮饑我食而寒我裘以余後之寂寥兮畜幼息而誓以守吾松楸嗟日居而月諸兮瞬息頃而十越春秋奈天命之不與兮志雖鋭而莫酬遭余時之不料兮抱疾疢而幾乎一周孰謂汝之戚而廢其寢食兮竟伏枕而弗瘳雖顛沛而心弗為之亂兮所云云者無非善後之謀感吾生之既邁兮方仗汝以遂其優游胡為棄我而逝兮忍不能為數載之留豈吾不德而致汝於斯兮折而夀之不修彼里閭之知與不知兮誰不為之涕流矧余感汝義誠切兮痛曷時而可休瞻鹿城之故原兮為吾母之樂邱汝其從吾室而後先兮侍吾母而仙遊惟汝事之既畢兮我亦免夫身後之憂茍素行無愧而可樂兮夫何間乎明幽俟豫命盡而為九泉之歸兮㑹一笑而相求長歌之悲過於慟哭兮我恨悠悠嗚呼淑新兮其知此否嗚呼淑新兮其知此否歌已遂刻於石以志其壙云正統十二年丁卯先生時年六十六歲友人史君實畫採薇圖遺之題其上曰採薇千古說夷齊風味還同我甕虀珍重故人知此意逺緘詩畫慰窮棲義孫周寶生正統十四年己巳先生時年六十八歲憶朱輔有曰家山杳杳同千里行李蕭蕭各一身憶昔相逢淳化鎮異鄉人念異鄉人其自注曰輔安慶人常客吳與余善前壬午秋相遇於淳化鎮於今幾四十載矣追憶其事不覺泫然景泰元年庚午先生時年六十九歲其自題曰余每咏昔所歌金陵妓雖老不覺墮淚惟沈誠學張文翔可以語此意也哀哉其詞曰佳人二八婉清揚客寄金陵歲月長邂逅東吳舊親識殷勤一一問家鄉其一石頭城下水瀠回曽為郎君把一杯今日偶從船裏過含情不覺首頻回其二景泰二年辛未先生時年七十歲自題其居曰居臨流水縈紆門對青山突兀四時風月雲烟總是吾家舊物但知安分休休不作書空咄咄且喜盈樽有酒何羡滿床堆笏君不見朝來簷日暖融融笑看梅花坐捫虱景泰三年壬申先生時年七十一歲有趙縉者以御史按吳虐民罔上歌風犬行以刺之其略曰白日都無戀主心黑夜絶無防盜意必當為人擊死棄中流帷蓋終無可埋地景泰四年癸酉先生時年七十二歲老妾周氏素慎事先生久除夕以詩贈之曰汝今事我三十年昔為少壯今皤然東西南北幾遷變勞苦飢寒深可憐深可憐念之能不心煩悁自知命分已前定肯學吹笳輕怨天昨發一言堪賞歎勸我無勞思後患但令歡笑樂餘年管取緝麻賣錢供爾魚羔飯魚羔飯不愧梁家孟光案適然義孫周寶拍手起舞為我歌青天阿翁大笑不覺七十三年又在今宵五更換景泰五年甲戌先生時年七十三歲是歲大潦吳中大饑有民風詩略曰一經水旱便流離風景蕭條思慘悽到處喚春空有鳥連村報曉寂無雞頺垣棄井荒蕪宅苦調哀音凍餓妻更有社公同寂寞年來不復享豚蹄又鍋無粒粟竈無薪只有松楸可濟貧半賣半燒俱伐盡可憐流毒到亡人葉文莊公盛稱其碩德奧學巍然鄉邦之重所為詩有杜荀鶴時世行風致與流俗輩所為空言無補之音不同者即此也時崑山令鄭達敬賢士往往與其簿造先生之廬而問以救荒之策有詩以紀之曰承恩降自九重天困苦崑民幸保全一念逺追前哲美同心尤藉簿公賢惠加寒素聲名重榮及蒿萊景色鮮慚愧草廬無供奉惟慿一縷博山烟景泰六年乙亥先生時年七十四歲春過幹山弔鐵崖先生墓有詩曰松江西來澱湖涘九峰厯厯皆相似中有一峯髙入雲鐵崖先生卧於此先生學正天才髙經濟文章重三史吳㑹依歸足俊才竊比關西號夫子方當元社將屋時羣雄在處蟠蛟螭英材無不被籠絡節義未免為文姬惟有先生不受羈放情歌酒隨游嬉拘拘士輩笑狂蕩明哲保身元不知君不見惓惓狀頭書李黼可念良工心獨苦無言混俗擬陶潛有仲即憐期蔣詡栁娘牢護守宫紅秋娘未負楊州杜我來尚感百年心再拜荒原一抔土與彥中子姪夜話有曰偶與諸郎說素心燈殘始覺到更深欲將舊事重提起怕惹哀情轉不禁壯志有懷徒感慨老身多病但呻吟宗風振作歸而輩勉力休令負寸隂景泰七年丙子先生時年七十五歲夏四月十六義孫周寶病腫死哭之曰義孫十歲頗聰明日夜惓惓望有成豈意永辭從學路那知頓絶讀書聲我生禀得殊孤獨爾命由來也薄輕石上三生如果有公孫願得叙餘情夏秋大旱作丙子民情觀風者採焉天順元年丁丑先生時年七十六歲自題小虞浦草菴有曰我家玉山下正壓虞溪隈門可羅鳥雀徑惟周蘚苔愧無濟時䇿髙位讓羣材安貧復守賤分外奚求哉甕頭白酒熟籬下黃花開為招陶淵明共歌歸去來天順二年戊寅先生時年七十七歲縣令鄭達卒於官先生以詩挽之曰不知有巳能忘勢破屋時勞肯見過亹亹笑談霏玉屑雍雍慈恕藹陽和無能野老䝉知久失所窮民感惠多千里湘潭歸櫬逺痛為吾道泪滂沱天順四年庚辰先生時年七十九歲四月十三葬義孫周寶於崑城祖墓之旁乃為詩以銘之曰生既隨公公死亦隨公公生死不相離情深江海同爾今寧爾居為我守空槨待得公公數盡來與爾復叙舊歡樂富貴夀不為厚貧賤夭不為薄何必羡人間萬户侯何必慕遼東千歲鶴噫煉鐵本鑄劍鑄就却成錯兩眼望爾爾不歸一日幾回清泪落義孫者為先生義養進安所生寶方二歲而進安死先生育之如子逮能舞象即聰慧絶人教以書史經義過目輒成誦且能領㑹意㫖深器異之竟以病死僅十歲其生為正統丁卯三月之八日也天順五年辛已先生時年八十歲精爽不衰如壯夫之飲食所適無逺近必步或勸稍就舟楫曰天生我足何用哉每夜讀書至二鼓燈下看細字不少瞬而五經子史能全卷背誦如水注尤善記國初典故至於文移案牘皆能腹笥之不遺且周知百物之名然孜孜好善言必忠信孝友以教後進子弟後進子弟之嗜學力行者咸之先生之門而取則焉冬十月十有一日為八十誕辰畫史張文著為祝夀圖鎮海指揮使彭城武政倡羣賢為詩其上誠學沈魯叙其略曰夫仁者壽固無異議而得夀之由或異可無言乎或謂先生幼厯艱虞勵苦志善醫藥而不飲酒節食慎疾所以致遐齡如此之健是殆見其粗而未見其末耶先生早居戎伍躬執戈矛以為童汪之役身雖弱而功則可紀其為宣尼之所韙者蓋亦有自矣况年與德進學有日新其為詩也寓少陵之史筆其為文也繼賈傅之經世而風教名節又拳拳不忘於言則與輕浮謔浪之嘲咏風月而不惜廉隅得喪者其為朝菌與莊椿又安知小年大年之相逺奚啻若是耶天順六年壬申先生時年八十一歲其書懷有曰少壯方當弱冠年曽揮血泪玉階前而今省著當年事不覺長號向老天其一阿婆蓬鬢白如銀八十年來未嫁人說與旁人都不信至今猶是女兒身其二天順七年癸未先生時年八十二歲清明日偕八九伴弔御史李樂菴劉龍洲易蓮峰陳信卿諸無嗣之墓其謝同遊有曰少罹多難可悲憐漂寄如萍六十年不道歸來頭雪白又隨親友弔前賢夏五月作夀藏於鹿城視塋之昭同邑沈魯記之其略曰先生少籍戎伍身厯多艱年逾八十而好古之心彌篤忠貞孝義之談日不虛口後生小子獲聞先生之謦咳莫不悚然佩服以警䇿於終身蓋亦古之遺老能引後進以遵道者世豈多見其人哉李唐司空員外生壙中歲時集客嘗曰吾豈須㬰處此耶既卒承家乏嗣而外孫為之世守今先生亦然先生於司空氏顯晦不同而志操則一後之人有觀九原而追慕髙風若趙孟叔孫之武子文仲為歸者㑹當有能記諸牘簡於是同邑縉紳士錢昌談懋周珙顧鑄朱泰安夏昶唐益馬成孫瓊陳錦葉盛武政張翔駱㢲陳翊周滙相與咏歌成卷外孫周雍與紱繪圖於前最後進士鄭文康陳德容跋其尾天順八年甲申先生時年八十三歲自題其居為逸老菴沈魯記曰鈍菴先生早罹世故遁跡於窮途涸轍者五十餘年而後歸老桑梓築室虞浦之濵題曰逸老俾余記之余以先生年逾八秩身厯多艱始憂巳之不能一朝居其室終憂民之不能一日遂其生僅留餘息于纊之未屬而猶汲汲皇皇日不暇給奚其老之能逸乎先生憮然嘆曰子未知余哉昔余先人以直道不詘淪沒羈旅吾欲執鞭從之而不可得垂髫隸戎伍補黑衣之缺以衛王宫方事之殷而遽焉倒戈束手徒涕泣而不能為之致命犬馬識其故主念之悲不能已如昨日嗚呼傷哉痛也其如吾情何日來衰老逾甚恆恐意荒而無益於事惟綴葺文字整頓名物切於日用者衆以為逺急於有生者人莫之行吾則舉而告之不厭其瀆而俾有為者得以盡其力不肖者亦知所自勉庶幾伐檀之詩無愧乎不力而食所謂畏天命悲人窮者則吾未敢自處也是以人跡吾行以為紛然煩擾而吾質吾中則所存者未易形言生得遂吾性死不失乎正終身服役奔走之不自恤而宴然安處於晚節末路有餘裕者庶幾真趣之可適吾何為而不能自逸哉昔者蔡中郎之留心漢典趙太僕之溫故軻書二子卒老於行猶不免於當世吾則聲利不入於耳榮辱不驚於心以終吾餘日其為逸又何如耶余作而言曰先生之逸其亦大異乎人之逸魯連之髙元亮之節究其歸初不異矣而蔡趙豈能望其廬而闖其户哉末豫小子稔聞先生之言而得其志之所在遂述其槩記諸逸老菴之壁成化元年乙酉先生時年八十四歲夏大水郡别駕邢姓者以民瘼相咨為苦雨謠以貽之曰今日雷明日雷雷聲未絶雨即隨三月初旬作雨始六月終旬猶未止田中水增五尺髙南風吹作如山濤更兼海潮挾湖水衝盡岸塍無可抵嘉禾萬頃爛根苗百姓寸心如火燒晝夜踏車敢辭苦不憂擂破牛皮鼓天公倘有哀憐心陽春早賜驅羣隂不然我民必當死天公惻隱何安此我今粗述民間風願達仁明太守公有時肯布萬全䇿我民感激情何窮我民感激情何窮成化三年丁亥先生時年八十六歲其有感曰羣峰叠叠水滔滔跋涉都忘舊日勞惟有不平常記得時因感觸便長號又一首虛名浮利總無求安分隨宜樂四休更覺近來疏懶甚日髙三丈未梳頭成化四年戊子先生時年八十七歲自題於夀藏圖卷後曰八十七年龔逸老鶴髮雞皮就枯槁我將奉我血肉軀瞑目全歸返洪造諸生為我作夀藏生怕鳶烏啄我腦藏既完非草草不儉不豐都道好一朝符到即奉行拂袖浩然歸去早不須銘不須表無德無功安足道獨抱惓惓一寸心惟善仁親以為寶眼底浮雲付等閒屑屑無煩較多少成化五年己丑先生時年八十八歲年雖髙而聰明不廢矍鑠健步出入未嘗乘輿馬勞物力一旦小有不安顧左右謂曰吾將逝矣早跋涉艱危勞苦萬狀瀕九死幸獲全遺駭於今日復何憾因為詩以别親知其寄親友曰鬼録吾知久有名但須符到即時行只慙知己無能報一一煩公為致聲其寄所親有曰近百衰齡瞬息過己知枯葉待辭柯只慙未報陽春德暖日和風受惠多辭世有曰氣短痰深夜不眠語言伸縮總無便屈腰只欲將扒地仰面何曽怕見天㸃㸃黑花生兩眼紛紛白雪被雙肩一生事業風中燭虛度春秋九十年正月二十八日癸未正陽整衣端坐口誦大學首章而逝有白氣起屋極上衝霄漢人以為忠孝所感先生諱詡字大章别號鈍菴所著有野古集又有因革事宜大抵關風教道民情好惡惻怛忠厚有少陵憂恤之心焉是歲閏二月十七日壬申紱與彥中叔父縉紳二弟經理襄事葬先生於鹿城先塋之昭沈魯銘其墓曰早罹世故多危疑中更困伏幾不支雖有利器將安施詩書之樂慰我饑文章節義慰我悲年垂九十志不移嗚呼先生後進師門人私諡曰安節先生以諡議刻之墓道
