body:
  text: 野古集卷下明龔詡撰七言律詩寧親堂為闕是賦事親常欲使親安羡子能行世所難既失形聲求視聽更於服食謹暄寒設令貽辱牲牢養爭似無憂菽水歡棠棣有詩昭古訓更須同氣好相看哭金縣丞名華蕭山人患難歸來僅兩春少聞官長愛斯民適逢被水連三嵗始見憂時只一人正是羣黎交頌德如何二豎遽亡身老夫雖未沾私惠公論難忘淚滿巾並漁圖方舟何處兩漁翁滿眼溪山樂趣同得失總歸談笑裡功名都付等間中鬢毛不是緣愁白面色常因醉酒紅去住問渠誰得似行雲流水任西東溪行一溪沓沓通潮汐兩岸蕭蕭響荻蘆水鳥傍人來復去山嵐入座有還無夷猶魯望煙波棹黯淡元暉水墨圖對此不勝懷感慨便宜拂袖老江湖和屈寓菴寫愁韻寓菴詩云荒涼舊業嘆無成憂患其如百感并滄海十年羈遠戍薄田三月廢春耕荷衣舊製秋雲薄蓬鬢新添曉雪明正是愁懷消不得更堪牀下亂蛩聲底事中宵夢不成一身無那萬愁并飄零蹤迹隨蓬轉淡泊生涯費舌耕短蠟燒殘寒漏永慈烏啼斷月華明年來多少傷心恨都付梅花曉角聲過顧玉山舊宅二首阿瑛舊宅綽山前父老猶能話昔年樓閣儼如真洞府主賓渾似小神仙花時不絶笙歌宴門栁常維書畫船肯信只今無片瓦平蕪漠漠鎖寒煙當時富貴號無前屈指繇來未百年好事主人金粟老能文館客鐵龍仙歌兒舞女花間席茶竈筆牀湖上船今日我來都不見數家田舍起炊煙屈季恆挽詩東吳南越久暌離凶聞傳來尚可疑一死果符沈海夢季恆當除南海丞日前一夕夢沈海中此生無復到家時季方忽動元方哭管仲空憐鮑叔知最是數行題壁字一畨吟咏一傷悲舟中有作楊城湖口暫經過沽酒無錢可奈何白水煮魚嫌味淡濕薪炊飯苦煙多落帆且入三乂港脫險方離萬頃波東望小橋煙栁外喜聞漁父一聲歌寄沈誠學黃童白叟真吾徒田園荒蕪身自鋤不知黑髮變華髮誰問今吾非故吾時逢知已話半日每對好山傾一壺世間萬事不足道醉鄉即是神仙都登虞山寄朱孟祺此日虞山試一登四觀佳致翠層層近城市店多沽酒傍水人家半下罾紅葉幾村秋老樹白頭何處晚歸僧分明一段江南意借問王維畫未曽孟祺善畫山水有名亡內女兄徐氏哀挽一從夫死誓終天甘守貧寒八十年名姓自期書太史風聲未肯讓前賢苦心只有孤燈識清夢惟慿獨鶴憐如此正宜為世表不蒙旌異為無錢芝塘道中即事北望寶芝三十里村墟六月雨餘天一灣流水一灣竹兩岸埀楊兩岸蟬謝老久荒先世宅平章猶記古時田浮生始悟真如夢一度經過一愴然王氏玉立亭詩愛君玉立亭子好三世傳來今百年挺挺尚存先氣槩依依不改舊雲煙並當恭敬三槐樹王氏有三槐堂獨任文章老鐵仙元楊廉夫先生有玉立亭詩今日我來重醉酒不勝瞻仰嘆前賢送馮翼夫廣文先生分題得魯橋瞻岱一肩行李惟書劍北上神州道路長迤邐渡沂遵魯望迢遙仰嶽辨齊疆濛濛欲雨春雲重鬱鬱凌霄晚岱蒼便好舉身登絶頂曉看紅日浴扶桑馬鞍山下陳氏故園主翁久作黃泉客後事無聞繼者誰竒石總為他有物翠萍空涸舊存池野花蜂蝶春遊處荒草牛羊曉牧時念昔經營良不易山靈應笑世人癡歸自婁東寄張文翔憶昨訪君婁水曲輕風寒食小桃開形容客况慿詩句消遣春愁藉酒杯白髮千莖雖似雪丹心一寸未成灰交遊獨有君知我都付無言一笑回寒家况味詩三首迷途役役可哀憐誰悟膏明取自煎花為可簮遭屈折草因無用得新鮮分無求外時時樂物不貪竒種種便從此閉門甘寂寞一囊羞澀任無錢人道先生貧可憐先生自幸省憂煎詩無俗氣篇篇好菊有清香朵朵鮮尚友古人誠我志折腰兒輩豈吾便老妻莫管瓶無粟自有韓康賣藥錢辛勤種植本堪憐齒為辛勤易惱煎瓜瓠及時肥更好芥菘得雨嫩而鮮傳家枯淡一生樂隨分羮蔬四季便説與兒孫休羡肉阿翁囊裡素無錢五言排律種園有感憶昔經營始年華已覺衰衆人皆笑晚獨我不嫌遲橘記移根處梅思種核時竹松培得所桃李值隨宜夏恐蒿萊沒冬憂霜霰欺備乾深積水防踐密編籬不憚揮鋤倦寧知抱甕疲願為經久計恥作茍安期已見花盈樹行看子滿枝乃知功既至自有效相隨助也徒為害忘之亦可悲六言絶句歸自琴川哀義孫誰信八旬之老反哀十嵗之孫最苦歸來元亮稚子無人候門題畫千尺虯形矯矯四時翠色蒼蒼但見氣雄林壑不知飽閲風霜五言絶句田家詞選六積絲方滿寸纍尺漸成端持入公門裏何人著眼看有女年方長其如家食貧鬻為豪右妾不得嫁比鄰烈日曬皮膚皮膚似漆烏郎君矜白面應笑種田夫種田良不易盡力費耕鋤入囷方為有在田猶是無縣吏打門急聞聲心膽寒受荆因脫袴露出去年瘢舉網秋江上鮮鱗尺許長丁寧莫輕食留薦里胥觴傷田家選二布穀催春種南村又北村可憐逃竄盡能得幾家存布榖催春種千聲復萬聲一身無託處安敢話歸耕南園十詠為南野先生賦選二紅藥翻階嬌態殿餘春芳名艷花譜樽酒暖風前僛僛為君舞碧梧夜月清暉流玉宇繁陰覆金井露警鶴鳴餘先生酒初醒陳蒙允德東莊八景選三悠然處採菊見南山佳興與心會淵明千載餘高情付吾輩秋水亭碧水涵秋空幽花映竒樹茅亭四面開是儂釣遊處清風徑自别東莊來嵗月易成久披圖懷此君清風想依舊偶成故人久不來意趣未能愜但見空庭中紛紛走風葉寂寞嵗云暮古樹嚴風號自知非范叔何敢望綈袍題宋鄭清之畫雙鳥為顧宗術賦紫翠湖山傍枝頭閙雙鳥長憶夢中聞西溪竹窗曉宗術别號西溪丙子暮春偶成咏落花雨後殘霞褪風前碎錦飛自知春已去敢恨蝶來稀為玄明村楊俊齋題周德玄畫玉笛吹殘夜聲聲太古情美人何處覔霜月正凄清題小畫二首我本林下人城市少蹤迹有癖愛看山時來坐磐石山中無俗事林下有間人我亦無媒者歸來願卜鄰題畫竹渴虬迸石出下飲清冷湍想當揮灑處逸興滿毫端題畫梅月寄淮陰陸仲孚兼柬杜可平江夜月微明梅花瘦影橫念君千里外多少嵗寒情題雙鵲圖道人心已靜得失久忘情寄語枝頭鵲無勞送喜聲題畫小景古木晝陰陰山高流水深翠苔磐石上誰識坐來心七言絶句客中思親三首才看黃落梧間葉又見青歸栁上枝慈母鬢毛紛似雪小兒方寸亂如絲江山不阻還家夢筆札難窮感舊愁回首北堂心最切可憐無計買歸舟烏母含飢守故巢烏兒折翅墮林皋相呼相應空相憶夜冷霜清月正高題畫竹樹􅀢􅀢過雨青沈煙一穗繞雲屏道人無復封侯夢自讀浮丘相鶴經間居四景吾家煙樹水南村盡日觀書靜掩門地僻喜無車馬過春風正滿緑苔痕門巷蕭然午睡餘紛紛鳥雀噪階除明窗淨几無間事自録農桑務本書偶栽佳菊傍幽泉嵗晚泉清菊更妍掬飲掇餐聊適意不圖却疾制頽年林下漁樵平日侶雪中梅竹嵗寒交幽居賸得春風力不放紅塵過小橋題寫竹贈陳九我記得淇園帶雨移春風又見長孫枝夜來月映南州榻一段高情孰許知邂逅相逢酒一樽清風明月滿柴門長安道上塵如海不到江南水竹村題畫生綃一幅寫煙蘿燕尾蜂腰曲折多最愛小橋楊栁外可能容我著漁蓑題畫竹贈袁宗魯落花飛絮自紛紛嵗晚相看獨此君却憶西齋明月夜滿窗清影共論文鸚鵡身繫雕籠翠羽摧故山千里夢中回如何性識誇靈慧不悟能言是禍媒燕春風茅舍兩烏衣花徑芹塘任意飛自與主人相識舊不唯鷗鳥解忘機鷺愛爾翩翩白雪衣水雲深處伴鷗飛不應既出風塵表猶有窺魚一點機畫鳥曉來微雨濕花梢何處飛來拂羽毛正好安棲莫輕舉野人張網在林皋梅花好處非關竹外斜自緣能向雪中華若隨桃李爭春色縱有清香未足誇氷雪姿容鐵石腸毅然孤立拒風霜高情却怕行人折不放橫枝易出牆梅實慣經巖下朔風寒青子才成已帶酸正味不諧時俗口未經沾舌已眉攢趙松雪竹石舊宋王孫元學士草堂心事玉堂身筆端寫出江南意落日西風為愴神雜詠狂瀾萬仞湧銀山坐見傾危瞬息間舟子慣施僥幸術滿張風幔意如間白髮二首斗星初轉建寅標已見春風在栁條堪嘆鬢邊新白髮不隨牆下雪俱消鏡裏容顔奈老何流光瞬息易蹉跎却嫌白髮無公道偏使愁人分外多墨竹贈陳存誠雨梢風葉夜颼颼長憶溪堂下榻留清氣逼人眠不得吟詩直過五更頭一别知心幾許時每因風月寄相思定知詩骨秋來瘦應似霜餘翠竹枝留侯已聞赤帝收秦鹿又見烏江刎楚猴一點報韓心已遂重輕宜不較封留題畫竹石二首憶移蘭棹過茗溪溪上天寒日欲西歌罷竹枝風正急亂雲生處鷓鴣啼霜清木落九秋天十里寒江罩晚煙記得故人舟泊處釣竿生在石崖邊歸婁江昔年曽住婁江上看到園林幾樹春今日歸來風景異梅花獨識舊時人懷季友梅并序時有司以仲怡博識敦請預修大典訪採物産地名韓墩有梨風味極美誠異種也仲怡謂收入郡志則常嵗當貢獻不無貽患百姓遂削而不書甚愜士論豫故於卒章及之知已堪憐會面難久無魚鳥問平安遙知風雪虛齋裡人與梅花共嵗寒舉世唯知婦寺忠荔枝興嘆只坡翁羡君識鑒追前哲敢不低頭拜孟東雙竹圖為陳止菴賦時余歸玉峯是夕寓其館難弟難兄一樣清襟懷同抱嵗寒情夜來醉倚南州榻愛聽風前珮玉聲田園雜興選六十載飄零東復西故園花木總成溪歸來但覺清貧好有舌何曽肻示妻風吹鶴髮短蕭蕭數首新詩酒一瓢愛看前村風色好不知行過竹西橋稚子囊書僕抱琴梅花香裡獨清吟人言恰是西湖景只是先生不姓林厚味何如淡味長充庖不羡大官羊老妻昨夜挑新菜釀得黃虀滿甕香草菴新結傍清溪種得梅花與屋齊結實未圖調鼎鼐嵗寒聊取作詩題布被稜稜似鐵寒一宵詩夢屢更端覺來愛煞窗前月送我梅花瘦影看題畫不向東華踏軟紅却來江上泛孤篷水光山色知多少都入先生笑詠中閨怨枝頭花落減春光遊子歸期正渺茫啼鳥數聲驚夢斷一庭芳草又斜陽春來日日望郎歸轉覺天涯信字稀回首又驚三月暮東風門巷栁花飛玉容花貌日摧頽夫壻他鄉未卜歸一點妾心何所似精金百鍊不成灰陶子巽惠扇以詩酬之昨荷緘書問起居清風一箑意何如報瓊只有言相贈燈火新涼好讀書夏暑一寒一暑自循環無伐天和付等間却笑世人因苦熱就涼爭欲倚氷山題畫每憶家山樂事多小橋煙栁蘸晴波只今已辦歸休計問字誰當載酒過秋况嵗晚天寒木葉稀敝廬無恙尚堪依如何苦戀魚羮飯孤負黃花待客歸秋日寄袁宗魯此身憔悴如秋葉每見涼風只欲飛想得故人新酒熟應培黃菊待儂歸詠菊曽見陶公拂袖歸晚香佳色傲霜威過時只抱枝頭老不學狂花到處飛林和靖觀梅圖頽然醉貌古衣冠酷愛梅花冒雪看疏影暗香吟已就但知詩好不知寒暮春有感客邊情緒苦多違光景那堪過眼非不覺此身忙裏老忍看春色雨中歸歸莊圖為俞景明賦青山緑樹映波光有客歸來趂野航柔櫓數聲歌一闋知君應是和滄浪永思亭為宗善賦源發岷峨可濫觴滔滔東注接扶桑最憐之子思親念箇樣淵深箇樣長周廷悅以畫梅二幅求題將勉其義子馬綱玉妃曽服丹霞釀氷雪雖寒暈自紅不似陌頭桃與杏強誇顔色媚春風題周豫怡園選二栁堤鶯韻搖曳春風緑萬絲笙簧朝暮語鶯兒誰知孝子傷心處不見停杯側耳時竹塢棋聲對客圍棋萬玉中子聲剝啄度春風仙翁久出巴山橘遺迹難忘手澤工題時苗留犢圖去官留犢記當年爭道沽廉未足賢自已不能嫌勝已幾人歸去泛空船陳允德湄溪新詠選二栁塘春水湄溪新水碧如苔溪上埀楊夾岸栽詩酒畫船來住慣眼明鷗鷺不相猜緑蔭黃鸝過雨溪山古木齊亭臺清閟緑陰迷黃鶯亦似憐佳境飛去飛來不惜啼風浪漁舟圖為族孫以行賦巨浪打翻高岸石狂風吹折古松枝漁郎要整絲綸釣好待風恬浪息時記會稽周士翔先生遺語二絶句并序余憶十載前假館常熟南野陳氏頻年與會稽周士翔先生往來聨榻士翔嘗語余記其先翁有言當元末閩中某城遭陳友定之亂兵圍久之有城主忘其姓名固守不下城陷被執友定謂曰汝不知有天數耶其人曰我但知為臣死忠為子死孝固不知天命為何等物也遂被害又有一人亦忘其姓字殺父讐於既赦之後憲司執之問曰汝不知國家有赦耶答曰殺人賊國家之法有赦人子之心不赦也竟致於理嗚呼士翔當日之言歷歷在耳今士翔仙去久矣昨夜忽夢見之既覺因憶舊言為賦此以紀之非惟先哲之忠且孝得以不泯抑亦足以為名教之一助云峕甲戌二月七日也不知天數為何物忠孝唯求死即休只此一言才出口遂令亂賊永含羞父讐不報活何為樂府曽聞太白詞李太白瀆漉篇人子不從天子赦片言千載有餘師民風絶句寄葉給事選五昨見城闉未死人青蠅千萬已周身憐渠父母初生日憂暑憂寒幾許仁塗松市上漆溪濱多少嗸嗸丐乞人不道孤舟風雪裡老夫亦是一飢民鍋無粒粟竈無薪只有松楸可濟貧半賣半燒俱伐盡可憐流毒到亡人年年村鼓響鼕鼕知是田家樂社公不道今年逢社日但聞人哭水聲中鄉村疫癘肆流行死者如麻實可驚天獨憖遺應有意要令操筆寫民情重到湄溪廷悅求詩爰題二絶勝境森森古木齊孤禽曽借一枝棲重來何處尋知己不是湄溪即印溪怡園不到已三年鬱鬱常勞夢寐牽今日重來因話舊不知清淚墮樽前秋江待渡圖琴川朱孟祺過余逸老菴為作此畫見遺後八年天順己卯吾姻友邵師舜先生築春水堂於馬溪之上適成見而愛之余因舉以為贈并賦一絶句愛爾草堂清可憐常因溪隔造無緣如今略彴通舟道不用高聲喚渡船濯足圖買得如梭一葉舟水雲深處伴間鷗從今洗却雙塵足不向京華謁貴遊詠蚊嘴利體輕乘夜出羣鳴音響似雷同不知血飽身肥後性命懸人掌握中過芝塘將謁馬字昌斷岡道中二首狂風急似離弦矢白雪輕如過眼花北望故人猶數里禦寒沽酒向誰家雪隨風力亂飛揚道上行人凍欲僵却笑老奴如便了鼻隨清涕尺餘長題謝孔昭畫山水和邵師聖韻懶逐諸公入省臺分甘無用老岩隈慿君説向清風道莫放紅塵到此來夏木埀隂圖愛爾幽亭俯碧溪扶踈古木與雲齊涼隂滿地日停午掩卷無言聽鳥啼題凌貞婦卷時洪水橫流官府督民堤築過季英處義方追貞婦貞婦曰我為婦人豈可與鄉男同事耶遂自縊死貞魂一點鎮常存肯逐飛揚嶺上雲惟有嫦娥最知己清光不惜照孤墳有感惟將富貴耀家門風節廉隅總不論世上幾多貪父母忍將銛刃剚兒孫屈原圖愛君惟欲悟君心歌罷離騷抱石沈忠義一心如許切汨羅千丈不知深歸自北莊離却南沙已夕暉隨潮小艇快如飛多情最是波心月一路相隨伴我歸早梅雪窗忽見兩三花便覺詩情漸有涯應是東君念窮獨春風先遣到儂家柏子庭畫蒼蒲愛爾青青石上蒲寒泉清浸一塵無世人不識無鹽女姣媚惟知羡子都癸未清明同八九友伴之玄明村為宋侍御樂菴先生掃墓道窮千載樂菴翁埋沒孤墳草莽中今日我曹來拜掃紙錢搖曳舞春風題聽泉圖萬竹林中一草亭亭前潄石水泠泠道人不是箏笆耳靜倚闌干自在聽負薪圖會稽愚婦厭夫貧辭去何曽愧失身富貴自期年五十買臣亦是一常人有感羣峰疊疊水滔滔跋涉都忘舊日勞唯有不平常記得每因感觸便長號晚菊寧憂失所困風霜自信生平晚節香一任寂寥無客賞看花原不為重陽觀梅梅花與我最相知看了南枝又北枝如此冷風如此雪無人不笑老翁癡歸自城中遇雪雪景詩情兩得宜枝藜何惜晚歸遲因過野老溪橋畔又為梅花立少時偕周季宏遊東皋亭琅玕萬箇繞庭栽無數青陰覆緑苔漫煮鳳團燒玊版不妨日日與君來遊西疇竹林森森萬玉俯清溪徑入蒼雲杳欲迷珍重主人勞載酒琅玕節下為留題枯荷紅衣落盡翠盤傾浣我清波一鑑明説與兒童須摘盡莫留餘葉引秋聲庭松嵗寒羣木總凋零愛爾亭亭色愈青誰信道人心似鐵小窗相對淡忘形謝南野先生作棺見贈大患應知為有身鳶烏螻蟻豈踈親只緣未達莊生意尚以遺骸纍故人和孫格軒為余題泛舟圖不慕瀛洲十八仙青雲無意事攀援只憐南國溪山好風月琴樽共一船道中見弋人有感而賦負弩蹲軀隱薜蘿鶴媒前導舞婆娑鳬鷖只合髙飛去同類應知誤汝多和金專居為陳羽伯頻寫竹韻專居詩云海虞山下久盤桓最愛西鄰竹萬竿欲造可憐無路入半梢惟許隔牆看旅館西風九月寒修篁搖翠兩三竿最憐明發歸舟裏可得推篷帶雨看題西溪書舍贈顧宗術西溪高隱有餘清最愜間中野老情秋夜幾回來借榻竹聲清比讀書聲癸亥民情太守安居花錦城眼前兒女沸歡聲豈知田野通宵雨救水渾如救火情驟雨狂風日夕并農夫淚眼幾時晴中秋賞客南樓上唯恨頑雲蔽月明乙丑冬大雪時邑宰以雪作戲故賦之衣破那禁透骨風雪花如掌暗長空憂民太守方沈醉熟睡紅爐暖閣中臘雪連朝冷氣嚴喜聞宜麥更宜蠶老夫正為蒼生幸凍死窮廬分亦甘丁卯初夏水旱農家兩不禁旱憂枯稿水憂沈可憐昔日求晴意即是今朝望雨心夜歸短棹孤篷一葉槎南周村裏訪俞華還家已及黃昏後細雨斜風兩岸蛙任溪道中縈迂曲徑隨溪轉咿軋肩輿傍栁行忽聽竹林茅屋下琅琅一派讀書聲南望玉山三十里從容時坐復時行不獨少寬輿從力看花兼得聽啼鶯偶題性耽間淡拙趨奔一任旁人笑我村自負踈狂抱竒氣平生不欲受人恩過芝塘東虞宅廢園梨花雪白海棠紅詩酒笙歌嵗嵗同不道世移人事改野花無數領春風題畫翼然亭子面江開亭下危磯鎖碧苔日日老翁來此釣見潮西去見潮回自述衰謝一首自憐百技一能無兩眼昏花四體枯不解禦凶兼嵗去此身真是舊桃符自題晚歸圖并序友人史君實為余作此畫適余歸自彥中氏遂題以詩君實和云日短天寒易落暉渡頭風起浪花飛濟川有興無人識好逐漁郎作伴歸紅樹離離映夕暉水天空濶雁高飛扁舟一箇輕如葉常載先生半醉歸移居二首飽玩青山性所耽晚從平遠寄茅庵年來苦被前村隔又擬移家更向南小虞塘上屋三間雖道無錢且得間更喜望中無隱蔽東西全體是青山與王忠孟登玉峰共飲春風亭山水千重復萬重少年相别老相逢春風亭下一杯酒山色不如人意濃西疇二首金橘圃滿樹霜丸萬顆埀年來惠我侑芳巵常因剖食憐佳味憶得窗前種核時梅花隴壟上梅花開百株嵗寒詩酒足清娛不知風雪溪橋路近有何人跨蹇驢題宗善所藏漁父圖清溪清似鏡新磨照見先生白髮多自幸素無官爵纍得從漁父老煙波畫題詩士女過雨湖山紫翠旁桂花香透藕絲裳不知綵筆蠻箋上和到關雎第幾章夢覺偶成夢裏千山復萬山家鄉迢遰苦思還覺來却在家鄉住又恐家鄉亦夢間賀程侯喜得子久慕君家積德多晚生英物喜如何老夫更著數年活當賦徐卿二子歌夜過沈時用宅扁舟夜過溪橋下譙鼓遙聞第二撾不敢扣門緣底事恐妨驚起樹頭鴉以人好烏亦好也漫興盡説先生甑有塵先生自道未為貧請看嵗晚東籬下無數黃金與白銀五松圖并序古人有題松詩末句云一事頗為清節纍秦時曽受大夫官余甚不然故賦此以伸五松不平之氣云爾羣居抗節德非孤肯為狂秦作大夫試想當年風雨裏此身曽屈祖龍無野古集卷下
