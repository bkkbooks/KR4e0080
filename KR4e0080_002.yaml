body:
  text: 野古集巻中明龔詡撰七言古詩甲戌鄉中民情長句寄彦文布政景泰五年甲戌歳正當南畝耕耘際忽然驟水漲江湖汹湧浩漫良可畏更堪滂沛雨兼旬大岸小塍俱決潰田家男婦犇救忙力竭氣窮無術備沈竈産蛙雖古聞今實見之非漫記東隣西舎咫尺間無舟不得相親慰况逢缺食方阻饑女哭兒啼割心肺哀哉此情當告誰上有青天下無地悲悽喑嗚無一言兩眼相看只垂淚官倉儲積豈無粟有司吝出牢封記千年汲黯今無人誰與皇家壯元氣縣宰懼難佯風顛飽食閉門經月睡一朝謀定人不知半夜攜金逺逃避郡侯坐視付不知但挾娼優日酣醉狥私掘去抵湖堰横流自此無能制甫差周倅問疾苦攫去白金如土塊府公唯責舊負逋不問蒼生問魚膾按察徒懲小小疵曲狥鄉情舎姦弊便宜太保幸見臨香火滿城人鼎沸羣姦媚事靡不為溷浴都將布衣􅖯令行雖僅免輕徭薪米從兹價増倍勸諭賑給浪得名偽錢糖粃成何濟雖擒妖人許道師多少無辜枉遭累一夫一婦皆王民鼓弄如何等兒戱昨來輕發激變語聞者至今猶戰悸功能人茍得專殺法律底須存八議萬一有失忠義心宵旰深憂豈㣲細乃知不學無術人隘陋終同斗筲器婁城老卒張文翔不忍憸邪肆欺蔽片言出口禍即隨從此無人觸奸吏只今所在皆凶荒未必不繇斯道致朝廷若不懲此曹無日可回天地意嗚呼我民今年性命已難保明年豈有全生計老夫殘喘不足惜横死深哀後生輩昨夜虚齋聴雨眠轉輾不能成一寐起來賦得民情詩惠政思君録相寄右拙作奉寄彦文布政賢侄相公庶幾得審鄉曲真情非敢招人過也此輩無活人手段但有殺人手段是詩萬勿示人毋使老拙復作張文翔也然老拙餓死有日恐不久於世他日歸省之餘幸致一樽酧我於溝壑中耳是年六月望日因人便書此以告别歸自雲間道經澱山湖與竹莊同賦澱山水深清到底俯視魚蝦逰鏡裏老夫偶此棹孤舟不是鴟夷載西子徃還不覺數日留三􅍩九峰都遍遊船中有酒有知己不醉忍使湖山羞興闌我欲婁城還回首馬鞍金碧堆未知何年復到此重與湖山酬一盃山亭鼓琴圖為顧宗術賦嘈嘈市喧不到耳衮衮臺省那經心悠然獨坐草亭下一曲為鼔瑤芳琴瑤芳琴傳太古不比近來新樂府子期去後誰知音髙山流水元無譜丙子夏秋苦旱呈鄭明府北山有雲不為雨南山有雷空作聲田疇龜裂稻苗死農夫日夜形哀鳴前歳滔天遭大水去年疫癘人多死甫能今歳可圖生旱魃為灾又如此嗟哉我民何罪愆罹兹荼毒連三年老夫作詩問造物天乎天乎何以然題葉義士討賊鷓鴣天詞後為元叔季綱維絶天狗下䑛生人血草萊隨處起戈矛人命輕如冶中雪姑蘇城東淞水南有巍佛廬名福嚴中潛秃虺二三輩怒嘘毒氣光炎炎時逢毅哉葉君子不是世間文墨士智謀勇烈出萬夫竟取凶狂付殊死一從歌罷鷓鴣天民方帖席得安眠至今聞者比昨日毛髪如竹猶森然春去秋來百年久精爽不隨骸骨朽玩寇髙駢劉巨容地下相逢忸怩否繇來五世得賢孫善保忠孝𢎞家門人見黄河浩浩入東海誰信發源萬里來崑崙五世孫與中守獨石有聲庚辰苦雨謡時五月至六月隂雨兼旬所在禾苗浸沒殆盡憂民感時殊無好况不能措一辭以寫悶六日僅得片時晴霽七日又雨為作此謡重重叠叠隂雲痴疾風驟雨常淋漓横流潏㶁晝夜響不息大塍小岸日欲傾倒無能支為問天公如何不肯暫時霽得非恠我噤口不作詩老夫今日作詩矣天公自合生歡喜早賜暘光照四方丁寧農夫作急為我車出田中水爛苗或有迴生理但得官租不負民不饑敢惜妻孥飽糠粃續賦苦雨謡今日雷明日雷雷聲未絶雨即隨五月初旬作雨始六月中旬猶未止田中水増五尺髙南風吹作如山濤更堪海潮挾湖水衝盡岸塍無可抵嘉禾萬頃爛根苗百姓寸心如火燒晝夜踏車敢辭苦不憂擂破牛皮皷天公倘有哀憐心太陽早賜驅羣隂不然我民必當死天公惻隠何安此我今粗述民間風願達仁明太守公濟時肯布萬全䇿我民感激情何窮王君澤以白叠扇求詩王郎手持白叠扇過我草堂求作歌作歌鄙俚豈足道巴唱吳歈争不多此扇骨格能抱節配以楮生如玉雪巻舒自我付等閒用舎繇人不須説冬則守寒歸篋笥夏則招凉解炎熱君不見齊紈出入君懷袖晚景可憐中道絶我歌此扇止於斯莫羨團圓似秋月諸君諸君聴我歌昔人解此唯東坡一朝飽喫惠州飯富貴一場春夢婆題山居讀書圖寒泉古木山之隅塵土不到幽人廬清風一榻酒㣲醒坦腹自讀羲皇書門逕蕭然寡輪鞅易安隠約柴桑居平生心迹許誰共展圖令我思歸與君不見諸公衮衮登雲衢車馬甲第争紛如無勞肉食已自愧進退况復懷次且又不見百年光景過隙駒邯鄲一夢俱成虛彼常不足我有餘㝠鴻髙舉誰能拘姑蘇夜泊闔閭城西越溪北扁舟夜泊官亭側人家燈火亂明星二鼓市諠猶未息衰翁轉輾不成眠厯想山川感今昔賢愚成敗非一人後世徒能記遺迹城頭烏啼霜氣寒江心水澄月色白沾衣幾許牛山情都付漁翁一聲笛追賦陸烈婦歌烈婦沈氏琴川人夫死自盡繇其家世貧賤無人齒録鄉人張有定為余言之故為賦此陸家有子賤且貧一生家住琴川濱唯能擊鼓與吹笛更無餘䇿堪資身其妻本是田家女目不知書心却古蓬頭垢面破衣裳樂與夫君共甘苦夫君卧病忽經年瓶無粒粟囊無錢晨昏何以給饘粥一飽十饑誠可憐眼中骨肉猶行路况彼鄉鄰肯相顧徬徨悽楚只天知嘿嘿更無人可訴一朝乞得斗升歸濟急庶以全燒眉不道抵家日將暮夫命已逐殘雲飛躃地號天幾絶氣祭畢隨將死相繼誰知村落婦人心有此堂堂真節義老夫聞此十餘年每嘆丈夫多不如芳名未免久湮沒春秋大筆何人書君不見豪兒剥民恣封殖輸榖公門僅千石如何反得義民名華表旌門炫金璧時入粟得名義民旌表為周徳元題陳如隠畫梅若人情氣蟠胸次素與梅花共心事茍托松滋與管城寫出孤山早春意不知前代有華光自許今人無第二千花萬蘂信心手妙處不縁香色泥君不見逋仙宅畔一枝開雪凛風寒見髙致誰知清曉角一聲已醖商家鼎中味題印上人所藏趙子昂楊亷夫二公墨蹟巻馬鞍之山殊峭拔秀麗蒼然壓吳浙暮靄朝嵐聳畫屏古檜長松挺髙節豈無超然出塵土託跡幽深守孤潔林泉賴此増光輝不負清風與明月吁嗟世變罹兵戈一時盛事隨消歇蒿萊滿眼鎖寒烟牛羊就牧狐狸穴見山有院人不知一記惟存趙松雪孟張屬和久寂寥膾炙幸聞仙伯鐵二公自是文場豪墨妙詞鋒總竒絶月潭何處得此巻寳愛深逾古環玦老夫為爾賦長歌待補山中名勝缺只疑二老㝠㝠中撫掌相看笑粗拙秃奴詩戲寄沈誠學東村二八張小姑髩髪油油如漆烏朝朝不惜五更起對鏡千梳并萬梳争似吾家阿奴秃落落數竿刪後竹一生不費膏沭資日出酣紅睡方熟君家有婢亦如此何幸少年猶有齒夜寒聊取代湯婆殊勝當年玉川子題阿翌寫墨梅翌生寫梅不寫迹不用臙脂唯用墨乃知鐵石歳寒心粧㸃何須事顔色君不見牝牡驪黄付等閒無鹽應笑西施白梅花莊詩為朱明仲賦先生卜築吳城曲䞉種梅花繞吟屋自期歳晚供詩料豈慕平泉與金谷花開時節天正寒雪花亂灑迷林巒杖藜引鶴飽幽翫不與梨雲同夢看歸來袖手寒窓坐石鼎有茶爐有火神交不覺兩忘情誰是梅花誰是我自述和沈誠學壯遊詩意先生卜築江之皋屋廬歳久渾無茅薄田數畝書一束耕耘誦讀忘疲勞旁人笑我謀生拙不道胸中藴竒絶幾多明月與清風一一難將向渠説年去年來春復秋隨宜無喜亦無憂眼中富貴等螻蟻一㸃不使靈臺留風雪行看歳寒至破褐從教露雙髀待得春來生意迴還我一身和暖氣為彦中題畫青山之青如佛頭白雲化作寒泉流世間塵土飛不到眼中景物俱清幽若人自是好静者豈非五栁先生儔每托琴書寫髙興脱屣樂從魚鳥遊却笑時人苦不達但知聲利孜孜求無異貪程夜行客漏盡鳴鐘猶未休君不見小虞塘西玉峰下一菴已遂吾菟裘共論心事肯相過斗酒當為山妻謀採桑曲桑柘雨晴如緑雲誰家女兒茜紅裙採桑纎纎露玉笋低首不肯觀使君採之採之弗容緩爭柰筐深未能滿只愁歸晚正蠶饑不道使君欲腸斷偶題逸老菴居臨流水縈紆門對青山突兀四時風月雲烟總是吾家舊物但知安分休休不作書空咄咄且喜盈樽有酒何羨滿床堆笏君不見朝來簷日暖融融笑看梅花坐捫虱題王樸菴隠居圖王君隠居臨漆浦物雅風淳真樂土杖履時來看故人滄浪日聴歌漁父盡力耕桑事衣食飽閲詩書驗今古老夫平日荷知已放棹頻過竹梅所王氏軒名琴樽動輒數日留忘却人間有官府憶昨别君滄浪邊東西魂夢勞相牽時馳歳去已堪惜物在人亡猶可憐賢郎孝友出天性對此遺澤號蒼天㸃隨淚落樹梢雨聲助嗚咽山中泉我今看畫題一篇含愁閣筆増悽然無繇得與同遊賞鶴歸華表知何年樸菴昔以此畫求詩留余室久矣不幸而卒聊賦此寓哀悼云續鐵心行男兒心腸硬如鐵婦人䜛言如火烈置之壚冶鼓風搧須臾硬鐵柔如線長鍼持出砧砆上火星四出誰能向一椎重兮一椎輕聲聞逺近錚錚鳴椎後復燒燒復椎或鋤或钁隨手成乃知男兒有慾心易軟豈能不惑常保骨肉之深情我願丈夫心如金莫如鐵一迴鍛鍊一迴堅彼火灰寒自當滅寓意天上雙星有常處夫為牛郎婦為女東西相望自年年只隔天津一泓許耕田匪易織亦勞不得從容相慰語傷心一掬淚如珠灑向人間作秋雨竹枝歌朝見浮雲飛出山暮見浮雲飛入山浮雲自是無心物郎既有心胡不還題雙松圖豫章楩楠中梁欐未免匠石斤斧尋嶧陽桐梓作琴瑟塵匣空恨無知音何如君家兩松樹飽含風露垂清隂輪囷雖不獲世用老氣自足雄山林長空六月灑蒼雪清絶不受塵埃侵夜來月出東山岑影落萬丈寒潭深道人大醉發長嘯直疑驚起雙龍吟五言律詩客中秋夜仲秋纔十日此夜已三更蕉葉兼梧葉風聲雜雨聲故園初斷夢逆旅未歸情無那庭堦下蛩音響到明寄陳存誠南野先翁業東皋素隠亭玉森三逕竹翠展一池萍水接清源活山隣古洞靈舊遊憐别久深荷眼終青碧蘚常封逕紅塵不到門處卑謙徳厚用拙道心存制作追前古窮探到本源每思燈火夜時得耳髙論民風潮挾兼旬雨登時水横流鯉從床下躍鷗向枕前浮措手知無地將何望有秋野翁如杜老日夜為民憂題西疇草堂閒人無俗事幽境有清娛樂與禽魚共情隨草木俱琴樽花外席茶筍竹間厨世路輕肥客相逢莫問渠七言律詩吳淞漁隠為陸大用賦吏人家住吳淞上不着羊裘只着蓑紅蓼白蘋隨處泊清風明月任情歌鬱林有石家聲舊甫里無官野興多昨夜秋風吹客夢問君鱸鱠味如何新秋夜來絡緯知秋早一片新聲出槿籬鱸鱠夢迴無限興羅紈題就不勝悲思親腸斷雲飛處憶友心摧月落時無柰江山苦留客故園歸計尚遲遲漫興辛苦寒窓理舊編不知黒髪變華顛壯心日就如灰冷瘦骨年來似石堅詩句偶成還自和酒杯得趣與誰傳功名事業君休問都付青春美少年秋興二首井上梧飄一葉秋天邊復見火西流炎威乍熄人皆喜寒氣方來我獨憂及早好修江上屋趁時宜補篋中裘却憐兒輩疎狂甚攜酒方登賞月樓眼底年華次第過此身未老鬢先皤形容憔悴已如此事業蹉跎將柰何徳薄敢辭知已少患深轉覺一身多秋風忽起江東興謾託蓴鱸發浩歌和唐陸龜䝉鵁鶄詩自是禽中隠逸流雕籠寧似舊汀洲菰蒲夢憶雙飛曉雲水愁憐一望秋素質豈招今日累文章翻致此身讐他時倘獲山淵惠好學髙飛海上鷗訪倪道士不遇因寄以詩芒鞵竹杖皂綸巾來覓烟霞洞裏人何處去尋騎鶴侣山隂負此好鵞賔風飄桂子香逾逺雨洗苔花色轉新為寄短歌申後約不妨多釀甕頭春季仲怡江上閒居白沙翠竹凈無塵歳晚棲遲寂寞濱小艇繫門輕似葉鮮鱗出水白如銀兒童笑語能留客鷗鷺分飛不避人我亦未除山水癖載書願結米家隣漫興草座麻衣苜蓿盤雖貧未足害清歡堦前嫩草抽書帶溪上新篁長釣竿陶亮日從親舊樂龎公獨遺子孫安閉門著得書盈篋未許旁人得借看竹林深處為九我賦知君素抱歳寒心晚結茅茨向竹林書幌色侵蒼靄重釣船隂鎖緑雲深溪山李白三杯酒風月嵇康一曲琹自欲杖藜時直造囊中恨乏買隣金九我欲買山結室以贈賦詩却之問山屹立幾何年閲厯應從太古前巖穴晦明遲旦暮松蘿濃淡任雲烟昨看猿鳥迎新客今見狐狸卧舊阡自信命非金石固不勞重費戴符錢述懷一首自嘆㣲軀一羽輕去留無定似遊僧病隨春草年年長愁逐秋潮夜夜増定省久違思老母心胸日塞念良朋何時得泛歸吳棹重讀父書親夜燈丙申九月十六夜寓琴川客館夢亡徐氏女兄月冷霜悽夜未終偶然相見夢魂中從容尚説平生話清瘦還如舊日容生死固知難再㑹幽明何幸得重逢覺來無語空垂淚恨煞穿雲曉寺鐘張觀復先生哀輓二首昔年幸獲叨文㑹今日那知死别離我輩正懷瞻北斗先生何忽跨南箕濟人誰施囊中藥傳世空遺篋裏詩道路行人盡流涕况予深荷叔牙知先生徳業超流俗逺近咸推君子儒蜀郡未消司馬渇彭城已發范増疽雖無好爵書華表却有芳名照海喁今日九泉歸𦵏處澗聲嗚咽助欷歔寄俞處士湖海歸來味道腴甘心寂寞卧衡廬玉堂金馬無新夢竹几芸窓有舊書方寸净圓秋月似一身閒逸野鷗如歳寒老我思三益正恨離羣久索居寄寫竹金端石湖海聞名已有年欲求識面苦無縁每於筆底觀秋意已信胸中有渭川萬蘀起雷思老可一枝垂露想坡仙草堂久矣無顔色願乞飄蕭數葉烟雜興歳晚歸耕學老農無拘無束甚從容詩朋酒侣時時㑹牧䜿漁郎處處逢風月每酣清晝夢塵埃不涴緑苔封有時醉顧山妻笑我欲唱歌卿和儂送羅孟維歸越中兼柬陳正菴論心未盡又分襟唱徹離歌酒漫斟杖履數陪尋徃蹟鄉闗無那促歸心楓林晚映烟光薄江水秋涵鴈影深他日相思隔吳越便風須寄短長吟夜宿淮雲寺二首似用上人朝來玉阜向芝川暮轉婁城百里懸僮識我心寧悼苦馬知人意不須鞭青青隴麥迷殘照靄靄江村鎖夕烟甫到淮雲星月爛扣門驚破老僧禪偶來借榻淮雲寺愛爾禪房事事清烟穗繞屏香漸爇雪花浮鼎茗新烹蘿窓有月還生白簷鐸無風或自鳴他日逺尋蓮社約也須沽酒慰淵明秋日苦雨九日江皋秋向深農家刈穫苦多隂誰知此日祈晴意即是前時得雨心野鳥正呼泥滑滑途人方嘆水涔涔何當盡掃頑雲翳獨使陽烏普照臨詠松亭亭獨立秀穹林得地何愁枳棘侵老節定經千歳久直根應透九原深塵埃不染憐渠貌風雪難移信此心却怪祖龍封爵汙不平時作怒濤音農樂軒為陸安道賦耕耘雖苦非為苦貧賤堪憂未足憂老婦一生甘食藿稚孫十歳解騎牛官租已畢知無事鄰社相邀慶有秋絶勝眼中金與紫施施難免乞墦羞趙氏雙桂軒趙公二子美無度雙桂名軒擬弟兄已信結根同得地更憐交葉總含清肯隨桃李争顔色要與松篁一性情笑煞田家紫荆樹却從憔悴復重榮寄懷袁兄雙丸逓走疾如梭老色駸駸可奈何白髪盡從愁裡得青春都向客中過壯懷久息營為嬾徃事難忘感慨多珍重故人知我意停雲回首付悲歌郭公輔輓詩古婁樽酒憶相違瞬息那知徃事非生死可憐客易别交遊轉覺老成稀謫仙此日騎鯨去丁令何年化鶴歸老眼一泓懷舊淚隨風散作雨霏霏和寓菴登山韻情親酒㫖復餚佳又煮䝉山石上茶黄菊賸開如有意青山無價似容賖狂歌感舊聲逾激醉筆題詩字半斜歸卧草堂成一覺已無魂夢到京華遊南園最愛南園風致好不妨日造兩三回漫燒玉版供茶椀旋網銀梭薦酒杯清興豈因春去减新詩不待雨來催自憐南北東西客可得長叨杖屢陪宿姑蘇半塘寺贈覺師平生不到半塘寺今夕方來借榻眠水緑山青塵外境風清月白雨餘天穹碑三復知前事廢業重興憶老禪珍重覺師能繼武不教松檜减雲烟和張文翔在獨石見寄文翔諱翼太倉人時為言事被謫長思逺道正綿綿南北暌離思慘然明月照人千里共愁雲迷目萬山連恨孤慈母衡門倚痛念難兄白日眠我亦為君知所戒唯慿一嘿免招愆送張先生辭順徳館西還春雪初消栁尚疎行人揮涕問前途忘憂已謝霜餘草返哺空歸月下烏歳月無情雙鬢老乾坤有恨寸心孤文情付與湄溪水相送歸舟過尚湖歸自琴川春暮偶成一身南北勞奔走不覺眼中三月殘水流花去送春色風挾雨來生晚寒缺食小民方困苦憂時野老正辛酸聊成短述歌時事或備風謡得採觀移家小虞浦上二首清風明月小虞濱鶴髪蕭蕭一老身自信胸中無一事得居林下作閒人無錢無粟未妨樂有酒有書誰道貧滿野閒花并野草無非都是自家春歳晚移家寂寞濵茅菴一箇僅容身昔為風月舊交友今作溪山新主人白髪被肩渾忘老清霜到骨不知貧年來學得邵康節拍拍滿懷都是春陳氏印溪書堂時琴川陳公範為師甚方正博文印溪源委逺而深溪上書堂隠竹林日究周情并孔思時鳴㸃瑟與回琴千之自得為師道申國能全愛子心舉世不知慈大小惟圖厚積滿籝金寄張文翔一自婁城别醉顛嫦娥不記幾回圓放舟久負青竜嘉定地名約對鏡空悲白髪年既賀晚成揚子宅不圖先着祖生鞭肯來逸老菴中話當問髯狂謂誠學借酒錢夜歸東莊夜來覓棹返東莊遙望東莊道路長書畫滿船風與月蒹葭兩岸露為霜荒雞逺唱如人哭潮水東歸似客忙更念田家勤苦甚晨炊燈火已煌煌歸自海上久别故人邀酌杯趁潮遙自海濵逥風吹蘆葉響如雨浪打船頭聲似雷友病尚淹勞夢想詩成未穏費敲推候門稚子正相望極目馬鞍金碧堆甲戌民風近體寄葉給事八首疫癘饑荒相繼作鄉民千萬死無辜浮屍暴骨處處有束薪斗粟家家無只縁後政異前政時改周公法致得今吳非昔吳寄語長民當自責莫將天數厚相誣昨過任溪南北村百家能得幾家存春秋旦暮常愁餓父母妻孥半病瘟荇粉磨成連濁土榆皮剝盡到深根相逢無復人形狀兩頰何曽斷淚痕釜可生魚甑有塵此言今日始知真極貧只為無恒業大患皆因為有身顧義恥隨偷作伴惜名樂與死為隣西風昨夜催寒信凍殺街頭多少人賦得田家苦楚吟一畨歌詠一傷心妻孥命賤等黄土薪米價髙同白金四隅常有盜賊警百里寂無雞犬音相逢父老聚頭哭淚滴洪波到底深自憐鬚鬢白如銀不道今年遇此迍數畝薄田俱付水百般老病盡隨身念渠漂泊無家者與我同為失所民終夜憂吟聲不絶半因憂已半憂人一經水旱便流離風景蕭條思慘悽到處喚春空有鳥連村報曉寂無鷄頽垣廢井荒蕪宅垢面蓬頭瘦損妻更有社公同寂寞年來不復享豚蹄驟雨狂風日夕并海濤奔湧勢如城一朝稻付深淵沒不復人從大道行官府乏儲難畫策田家無計可求生老夫亦是溝中瘠莫怪歌聲似哭聲田疇不見見江湖烟火人家大半無薄熟豈能周晚歳實徴安得副官租豸冠素解矜民瘼奏牘終能達帝都昨日喜聞停免政不憂鞭撻爛皮膚千墩夜泊上鄭明府扁舟夜泊千墩浦耳内都無鷄犬聲到處試從村老問無人不頌宰官清一年秋賦相將畢兩月春田次第畊惻隠願加時賑給莫勞安撫問民情陳安止孟東輓詩幸接芳隣竝早孤如魚同隊長東吳余豈逺作逋逃客公已髙登貴顯途故里菊松三逕在歸舟囊槖一錢無澄思七十年前舊淚眼何曽為老枯送郁老友歸芝塘細雨弄晴三月天故人辭我歸芝川墻頭燕子語留客溪上栁花飛撲船小姬拍案調新曲野老揮毫書大篇沈誠學有序最是落紅如惜别隨風㸃㸃墮樽前春江别意圖送友人江上春風拂栁絲畫船撾鼓送君時壯行賴有詩盈軸拚醉何辭酒滿巵風月自今勞逺夢溪山從此起遐思交情别意知多少惟有青山䞉得知過虞家宅廿載流光快擲梭虞卿宅畔重經過白頭野老都成鬼紅粉村娃總作婆官賦孰如今日重人家不似舊時多夕陽野草花橋路不覺徘徊發浩歌送王公亮之桂林春雨初晴春日暄行人話别水西軒一壺易盡辭吳酒萬里難留適越轅壯志豈愁南海障寸心惟念北堂萱客中情緒多傷感莫向瀟湘夜聴猿寄淮安杜可久可平兄弟顧我容顔今老大憶君兄弟更辛酸别來十載又廿載厯盡千難與萬難舟檝幾遭風浪險竹松多受雪霜寒武陵橋上今宵月千里相思不忍看題東峰菴為王庭美賦東峰境界無塵土華扁未寒前日盟茶話偶來留坐久功名頓覺等閒輕春風秋月馬鞍山東西二亭名副吟賞夜鶴曉猿無怨聲主人焚香讀經罷多少青蓮南海情自况短髪被肩霜雪如怡然自樂易安居不圖時譽貧辭富豈謂來生老讀書嘗見一老人年九十手不釋巻人問之曰讀來生書耳無愧自然成快活多財未必見贏餘眼中役役蝸蠅輩過眼浮華總是虛送陳説菴先生歸尚湖舊隠攜取舊書歸舊隠匆匆惜别意如何自憐野老愚䝉甚每荷先生啟益多客夢逺懸親塜樹鄉心長憶尚湖波自今良㑹知何日翹首虞山付短歌過任陽有感任水灣灣南北流人家多住竹林幽舊堤不見尋梅舫遺趾空聞夢鶴樓漠漠草萊將薄暮離離禾黍已深秋可憐當日歡娛地不道今成滿目愁前此承與中約同諸士友登玉峰弔祭宋先賢衞文節公祠有感衞公名徳久傳芳祠宇荒凉付夕陽地絶掃除多積蘚逕通樵牧半無牆不縁著績薫穹壤安得懷賢奠酒漿流俗但能知諂媚強將夫婦塑城隍寄淮安陸仲孚康王宅畔舊比隣樽酒相違二十春俗態已翻千百様故交今失幾多人一般有累丹心苦聞是無兒白髪新若遇便風如見憶鯉書無惜寄歸頻送陸徳深歸河陽江上一壺新熟酒擔頭數巻聖賢書也知無計留歸棹未卜何時過草廬子弟匆匆方惜别烟波𣺌𣺌正愁予到家暇日遙相憶尚為先生候鯉魚别沈克懋十載西齋瞬息過不堪雙鬢已成皤每驚春鴈添歸興常見秋風發棹歌久客何君知我厚暫違憐我望君多匆匆莫訝輕分手争柰婁雲入夢何别俞景明多君積學富才賢文采風流屬少年拙句每成勞屬和苦心無訴賴相憐離樽忍醉江頭酒别鶴愁聞月下絃歳晚有情如見憶雪中當泛子猷船和屈季恒寫懷韻因以餞之季恒詩云青雲望斷哭途窮白首從戎碧海東詩酒盟寒嗟㑹少田廬業廢嘆囊空虛名徒爾為身累徃事真成與夢同後夜相思在何處海天明月照孤篷其兄孟東和云念汝親情豈有窮那堪遙隔海西東致身雲路知無分寄迹窠巢嘆一空花蕚庭前徒自好琴樽客裡與誰同愁來不覺垂雙淚長向鴒原望轉篷友人袁宗魯和云丈夫雖困豈終窮天使丁寛載易東義重念遺鄉國逺理明心豁海天空琴書此日分攜去詩酒何年復與同他日老予思誨益烟波𣺌𣺌望歸篷四十餘年吾道窮一身南北又西東家山杳杳徒勞夢事業茫茫總付空自謂此情唯吾有豈知今日與君同題詩不盡相思意目送悠悠泛海篷和安止歸田相逢莫嘆二毛侵共喜羈禽返故林因與對床談徃事不知擊節起長吟簮纓已果平生願桑梓今全夙昔心好約明春真率㑹看花酌酒更彈琴吳塘夜泊懷屈季恒孤舟夜泊吳塘渡兩岸秋風響荻花寧海驛潮開畫舫古婁城戍咽悲笳雨聲一夜不離枕客慮萬條都在家甫睡又成懷友夢逺隨征鴈過南沙晚自崑城歸北郊别墅獨步出城光景暮村居處處起炊烟團圓未見月離海厯落已看星在天别墅牛羊歸逐逐逺汀鳬鴈下翩翩茅茨一㸃青燈在知是老妻猶未眠和安止秋日見尋匆匆歳月去如流又見凉風起荻洲眼底故人年未暮就中唯我鬢先秋壺觴漫託耆英㑹山水寧辭爛漫遊聞道北莊饒勝槩宦情得似野情否送袁兄宗魯入京少小論交至老成悲歡離合幾闗情桑榆正擬同幽賞書劔那知復此行膝下苦違頭白母囊中况乏孔方兄孤鸞别鶴愁無限謾託瑤琴訴月明苦旱狂風日烈迷塵道不奈為災旱魃何病草渇心思化雨涸鱗翹首望恩波湫潭靈物空為禱田野農夫彊作歌若箇解伸探月手煩君為我挽銀河題金耑居為陳羽伯畫竹居圖次張觀復先生韻明月清風境界寛不栽凡卉只琅玕庭除䞉有三湘意枕簟能無六月寒時見啄苔來縞鶴每驚拂石舞青鸞故人詩畫俱清絶可得頻過一借看閒居即事幽居景物自清妍入眼經心事事便暑氣漸消秋近候凉風欲動雨餘天庭除千葉舒紅槿盆盎雙頭吐白蓮更有芭蕉尤可愛最宜濡墨寫長篇與袁葛二兄泛舟至婁東風滿孤篷雨灑窓故人同載下婁江緑疇南北連千畝白鳥髙低去一雙濁酒任斟那計數野歌隨意不論腔紀行豈是無新作正愧曹鄫淺陋邦漫成逺慕淵明自把鋤從渠兒輩笑迂夫生憐花鳥如兒女酷愛溪山似畫圖不飲幸然無酒債好吟長自負詩逋年來尚覺疎狂在折簡應知未易呼侯門深鎖曳長裾相府尤慚進謁書破甕有虀聊當肉直鈎無餌豈圖魚清風皓月終歸我紫綬金章總付渠謾喜工師求大木不曽回顧道旁樗自愛閒居雅趣多不容塵土涴松蘿幽深彷彿元公洞安樂依稀邵子窩或武或文燒藥火非商非徴採樵歌年來久息趣炎夢冷笑飄飄赴燭蛾田家苦楚吟己未秋作極目滔滔水横流不分髙壟及低疇徃來客子嗟無路刈穫農夫恨乏舟爨下鯉魚聞撥刺枕邊鷗鷺見沈浮官家不信民風苦方擬騰書賀有秋野古集巻中
